<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jira Boards — PM's Delivery Assistant</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css" />
  <style>
    :root {
      --washed-blue:    #053057;
      --cool-gray:      #314550;
      --dark-gray:      #0B0D0E;
      --gray:           #1A1A1A;
      --neon-turquoise: #00EDED;
      --light-turquoise:#A2F3F3;
      --off-white:      #F4F3F0;
      --white:          #FFFFFF;
      --jira-blue:      #0052CC;
      --jira-light:     #2684FF;
      --font: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      font-weight: 400;
      background: var(--washed-blue);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(49,69,80,0.6);
      gap: 16px;
      flex-wrap: wrap;
    }

    .header-left { display: flex; align-items: center; gap: 14px; }

    .blend-logo svg { height: 24px; width: auto; }

    .breadcrumb {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: rgba(255,255,255,0.45);
    }
    .breadcrumb a { color: rgba(255,255,255,0.45); text-decoration: none; }
    .breadcrumb a:hover { color: var(--neon-turquoise); }
    .breadcrumb .sep { font-size: 10px; }
    .breadcrumb .current { color: var(--white); }

    .jira-badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 11px; padding: 4px 10px; border-radius: 99px;
      background: rgba(0,82,204,0.18); color: #66B2FF;
      border: 1px solid rgba(0,82,204,0.35);
    }

    /* ── Page body ── */
    main { flex: 1; padding: 28px 32px 48px; max-width: 1280px; margin: 0 auto; width: 100%; }

    /* ── Page title row ── */
    .page-title-row {
      display: flex; align-items: flex-end; justify-content: space-between;
      margin-bottom: 24px; gap: 16px; flex-wrap: wrap;
    }
    .page-title { font-size: 22px; color: var(--white); margin-bottom: 4px; }
    .page-sub { font-size: 13px; color: rgba(255,255,255,0.45); }

    .refresh-btn {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; padding: 7px 14px; border-radius: 8px;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.7); cursor: pointer; transition: all 150ms;
    }
    .refresh-btn:hover { background: rgba(255,255,255,0.12); color: var(--white); }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 18px;
    }

    /* ── Project card ── */
    .card {
      background: var(--cool-gray);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 200ms, box-shadow 200ms;
    }
    .card:hover { border-color: rgba(0,237,237,0.25); box-shadow: 0 4px 20px rgba(0,0,0,0.2); }

    .card-head {
      padding: 16px 18px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      display: flex; align-items: center; gap: 12px;
    }

    .project-avatar {
      width: 40px; height: 40px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 600; flex-shrink: 0;
      color: var(--white);
    }

    .project-info { min-width: 0; }
    .project-name { font-size: 14px; color: var(--white); margin-bottom: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .project-key  { font-size: 11px; color: rgba(255,255,255,0.4); }

    .open-btn {
      margin-left: auto; flex-shrink: 0;
      background: none; border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.5); border-radius: 7px;
      padding: 5px 9px; cursor: pointer; font-size: 11px;
      display: inline-flex; align-items: center; gap: 5px;
      transition: all 150ms; text-decoration: none;
    }
    .open-btn:hover { border-color: var(--neon-turquoise); color: var(--neon-turquoise); }

    /* ── Card body ── */
    .card-body { padding: 14px 18px 16px; }

    /* ── Backlog row ── */
    .backlog-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 12px; border-radius: 8px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      margin-bottom: 10px; cursor: pointer;
      transition: background 150ms;
      text-decoration: none; color: inherit;
    }
    .backlog-row:hover { background: rgba(255,255,255,0.08); }

    .backlog-label { display: flex; align-items: center; gap: 7px; font-size: 12px; color: rgba(255,255,255,0.7); }
    .count-chip {
      font-size: 11px; padding: 2px 8px; border-radius: 99px;
      background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.6);
    }

    /* ── Sprint rows ── */
    .sprint-label { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
      color: rgba(255,255,255,0.3); margin-bottom: 7px; }

    .sprint-row {
      display: flex; align-items: center; gap: 10; padding: 10px 12px;
      border-radius: 8px; border: 1px solid rgba(255,255,255,0.07);
      margin-bottom: 7px; cursor: pointer; transition: all 150ms;
      text-decoration: none; color: inherit;
    }
    .sprint-row:last-child { margin-bottom: 0; }
    .sprint-row:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.14); }

    /* Active sprint gets blue accent */
    .sprint-row.active {
      border-color: var(--jira-blue);
      background: rgba(0,82,204,0.10);
      box-shadow: inset 3px 0 0 var(--jira-blue);
    }
    .sprint-row.active:hover { background: rgba(0,82,204,0.16); }

    .sprint-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .sprint-dot.active { background: var(--jira-light); box-shadow: 0 0 6px rgba(38,132,255,0.6); }
    .sprint-dot.future { background: rgba(255,255,255,0.25); }

    .sprint-info { flex: 1; min-width: 0; }
    .sprint-name {
      font-size: 12px; color: var(--white);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 2px;
    }
    .sprint-dates { font-size: 10px; color: rgba(255,255,255,0.35); }

    .sprint-count {
      font-size: 12px; color: rgba(255,255,255,0.5); flex-shrink: 0;
      display: flex; align-items: center; gap: 4px;
    }
    .sprint-count i { font-size: 11px; }

    .active-badge {
      font-size: 9px; letter-spacing: 0.05em; text-transform: uppercase;
      padding: 2px 6px; border-radius: 99px;
      background: rgba(38,132,255,0.2); color: var(--jira-light);
      border: 1px solid rgba(38,132,255,0.35); flex-shrink: 0;
    }

    /* ── No sprints ── */
    .no-sprints { font-size: 12px; color: rgba(255,255,255,0.25); padding: 10px 0; text-align: center; }

    /* ── States ── */
    .state-loading, .state-error, .state-empty {
      text-align: center; padding: 80px 24px; color: rgba(255,255,255,0.4);
    }
    .state-loading i { font-size: 32px; display: block; margin-bottom: 14px; animation: spin 1s linear infinite; color: var(--neon-turquoise); }
    .state-error i { font-size: 32px; display: block; margin-bottom: 14px; color: #E24B4A; }
    .state-loading p, .state-error p { font-size: 14px; }

    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    /* ── Footer ── */
    footer { padding: 16px 32px; border-top: 1px solid rgba(49,69,80,0.5); }
    footer p { font-size: 11px; color: rgba(255,255,255,0.2); text-align: center; }

    @media (max-width: 640px) {
      header, main, footer { padding-left: 16px; padding-right: 16px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

  <div class="jira-badge">

</header>

<main>
  <div class="page-title-row">
    <div>
      <div class="page-title">Jira Boards</div>
      <div class="page-sub" id="subtitle">Loading your projects…</div>
    </div>
    <button class="refresh-btn" onclick="loadBoards()">
      <i class="ti ti-refresh"></i> Refresh
    </button>
  </div>

  <div id="content">
    <div class="state-loading">
      <i class="ti ti-loader-2"></i>
      <p>Fetching boards and sprints from Jira…</p>
    </div>
  </div>
</main>

<footer>
  <p>Blend 360 · PM Delivery Tools · Internal use only</p>
</footer>

<script>
  // Palette for project avatars (cycles through)
  const AVATAR_COLORS = [
    "#0052CC", "#5B21B6", "#065F46", "#92400E",
    "#1E40AF", "#7C3AED", "#0F766E", "#B45309",
    "#1D4ED8", "#6D28D9", "#047857", "#D97706",
  ];

  function avatarColor(key) {
    let h = 0;
    for (let i = 0; i < key.length; i++) h = (h * 31 + key.charCodeAt(i)) & 0xFFFFFF;
    return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length];
  }

  function initials(name) {
    return name.split(/\s+/).slice(0, 2).map(w => w[0]).join("").toUpperCase();
  }

  function formatDate(iso) {
    if (!iso) return "";
    try {
      return new Date(iso).toLocaleDateString("en-GB", { day: "numeric", month: "short" });
    } catch { return ""; }
  }

  function renderBoard(b) {
    const active  = b.sprints.filter(s => s.state === "active");
    const future  = b.sprints.filter(s => s.state === "future");
    const hasAny  = b.sprints.length > 0 || b.backlogCount > 0;
    const color   = avatarColor(b.projectKey || b.name);

    const backlogRow = `
      <a class="backlog-row" href="${b.url}" target="_blank" rel="noopener">
        <span class="backlog-label">
          <i class="ti ti-stack-2" style="font-size:13px; color:rgba(255,255,255,0.4)"></i>
          Backlog
        </span>
        <span class="count-chip">${b.backlogCount} issue${b.backlogCount !== 1 ? "s" : ""}</span>
      </a>`;

    function sprintRow(s) {
      const isActive = s.state === "active";
      const dateRange = s.startDate && s.endDate
        ? `${formatDate(s.startDate)} – ${formatDate(s.endDate)}`
        : "";
      return `
        <a class="sprint-row ${isActive ? "active" : ""}" href="${b.url}" target="_blank" rel="noopener">
          <span class="sprint-dot ${isActive ? "active" : "future"}"></span>
          <span style="width:10px; flex-shrink:0"></span>
          <span class="sprint-info">
            <div class="sprint-name">${s.name}</div>
            ${dateRange ? `<div class="sprint-dates">${dateRange}</div>` : ""}
          </span>
          ${isActive ? `<span class="active-badge">Active</span>` : ""}
          <span class="sprint-count">
            <i class="ti ti-file-text"></i> ${s.count}
          </span>
        </a>`;
    }

    const sprintSection = !hasAny ? `<div class="no-sprints">No sprints or backlog data</div>` : `
      ${b.backlogCount > 0 ? backlogRow : ""}
      ${b.sprints.length > 0 ? `
        <div class="sprint-label" style="margin-top:${b.backlogCount > 0 ? '12px' : '0'}">
          Sprints
        </div>
        ${b.sprints.map(sprintRow).join("")}
      ` : ""}
    `;

    return `
      <div class="card">
        <div class="card-head">
          <div class="project-avatar" style="background:${color}">${initials(b.projectName || b.name)}</div>
          <div class="project-info">
            <div class="project-name">${b.projectName || b.name}</div>
            <div class="project-key">${b.projectKey} · ${b.type}</div>
          </div>
          <a class="open-btn" href="${b.url}" target="_blank" rel="noopener">
            Open <i class="ti ti-external-link" style="font-size:11px"></i>
          </a>
        </div>
        <div class="card-body">
          ${sprintSection}
        </div>
      </div>`;
  }

  async function loadBoards() {
    document.getElementById("content").innerHTML = `
      <div class="state-loading">
        <i class="ti ti-loader-2"></i>
        <p>Fetching boards and sprints from Jira…</p>
      </div>`;
    document.getElementById("subtitle").textContent = "Loading your projects…";

    try {
      const res = await fetch("/api/jira/board-overview");
      if (!res.ok) throw new Error(await res.text());
      const boards = await res.json();

      if (!boards.length) {
        document.getElementById("content").innerHTML = `
          <div class="state-empty">
            <i class="ti ti-layout-board" style="font-size:32px; display:block; margin-bottom:12px; color:rgba(255,255,255,0.2)"></i>
            <p>No boards found in your Jira workspace.</p>
          </div>`;
        document.getElementById("subtitle").textContent = "0 projects";
        return;
      }

      const activeCount  = boards.reduce((n, b) => n + b.sprints.filter(s => s.state === "active").length, 0);
      document.getElementById("subtitle").textContent =
        `${boards.length} project${boards.length !== 1 ? "s" : ""} · ${activeCount} active sprint${activeCount !== 1 ? "s" : ""}`;

      document.getElementById("content").innerHTML =
        `<div class="grid">${boards.map(renderBoard).join("")}</div>`;

    } catch (err) {
      document.getElementById("content").innerHTML = `
        <div class="state-error">
          <i class="ti ti-alert-triangle"></i>
          <p>Could not load boards: ${err.message}</p>
        </div>`;
      document.getElementById("subtitle").textContent = "Error loading projects";
    }
  }

  loadBoards();
</script>
</body>
</html>
