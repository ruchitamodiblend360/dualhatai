                    background: tab === t.id ? "#A2F3F3" : "#F4F3F0",
                    color: tab === t.id ? "#053057" : "#1A1A1A" }}>{t.count}</span>
                )}
              </button>
            ))}
          </div>

          {/* Tab content */}
          <div style={{ padding: "14px 16px" }}>

            {tab === "gaps" && (
              <div>
                {!result.gaps?.length
                  ? <p style={{ fontSize: 13, color: "#1A1A1A", margin: 0 }}>No significant gaps detected.</p>
                  : result.gaps.map((g, i) => {
                      const c = SEVERITY_CFG[g.severity] || SEVERITY_CFG.info;
                      return (
                        <div key={i} style={{ border: `1px solid ${c.border}`, borderRadius: 6, padding: "10px 12px", marginBottom: 8, background: c.bg }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4 }}>
                            <i className={`ti ${c.icon}`} style={{ fontSize: 13, color: c.color }} />
                            <span style={{ fontSize: 11, fontWeight: 500, color: c.color }}>{c.label}</span>
                            <span style={{ fontSize: 11, color: c.color, opacity: 0.7 }}>· {g.area}</span>
                          </div>
                          <p style={{ margin: "0 0 4px", fontSize: 13, color: "#314550", lineHeight: 1.5 }}>{g.issue}</p>
                          <p style={{ margin: 0, fontSize: 12, color: "#1A1A1A", lineHeight: 1.5 }}>
                            <i className="ti ti-arrow-right" style={{ fontSize: 11 }} /> {g.fix}
                          </p>
                        </div>
                      );
                    })}
              </div>
            )}

            {tab === "ambiguities" && (
              <div>
                {!result.ambiguities?.length
                  ? <p style={{ fontSize: 13, color: "#1A1A1A", margin: 0 }}>No ambiguous language detected.</p>
                  : result.ambiguities.map((a, i) => (
                      <div key={i} style={{ display: "flex", gap: 11, padding: "10px 0",
                        borderBottom: i < result.ambiguities.length - 1 ? "1px solid #f4f6f8" : "none" }}>
                        <div style={{ width: 28, height: 28, borderRadius: "50%", background: "#FAEEDA",
                          display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                          <i className="ti ti-question-mark" style={{ fontSize: 14, color: "#854F0B" }} />
                        </div>
                        <div>
                          <div style={{ fontSize: 12, fontFamily: "monospace", color: "#854F0B",
                            background: "#FAEEDA", padding: "2px 7px", borderRadius: 4,
                            display: "inline-block", marginBottom: 4 }}>"{a.phrase}"</div>
                          <p style={{ margin: 0, fontSize: 13, color: "#314550", lineHeight: 1.6 }}>{a.question}</p>
                        </div>
                      </div>
                    ))}
              </div>
            )}

            {tab === "dependencies" && (
              <div>
                {!result.dependencies?.length
                  ? <p style={{ fontSize: 13, color: "#1A1A1A", margin: 0 }}>No dependency signals detected.</p>
                  : result.dependencies.map((d, i) => {
                      const c = CONFIDENCE_CFG[d.confidence] || CONFIDENCE_CFG.low;
                      return (
                        <div key={i} style={{ display: "flex", gap: 10, padding: "10px 0",
                          borderBottom: i < result.dependencies.length - 1 ? "1px solid #f4f6f8" : "none" }}>
                          <div style={{ width: 28, height: 28, borderRadius: 6, background: "#F4F3F0",
                            display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                            <i className={`ti ${DEP_ICONS[d.type] || "ti-link"}`} style={{ fontSize: 14, color: "#1A1A1A" }} />
                          </div>
                          <div style={{ flex: 1 }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 3 }}>
                              <span style={{ fontSize: 12, fontWeight: 500, textTransform: "capitalize", color: "#053057" }}>{d.type}</span>
                              <span style={{ fontSize: 10, fontWeight: 500, padding: "2px 6px", borderRadius: 99, background: c.bg, color: c.color }}>{d.confidence} confidence</span>
                              {d.status && (
                                <span style={{ fontSize: 10, padding: "2px 6px", borderRadius: 99,
                                  background: d.status === "acknowledged" ? "#E1F5EE" : d.status === "implied" ? "#FAEEDA" : "#FCEBEB",
                                  color: d.status === "acknowledged" ? "#0F6E56" : d.status === "implied" ? "#854F0B" : "#A32D2D" }}>
                                  {d.status}
                                </span>
                              )}
                            </div>
                            <p style={{ margin: 0, fontSize: 13, color: "#1A1A1A", lineHeight: 1.5 }}>{d.description}</p>
                          </div>
                        </div>
                      );
                    })}
              </div>
            )}

            {tab === "improved" && (
              <div>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                  <span style={{ fontSize: 12, color: "#1A1A1A" }}>AI-suggested rewrite — review before using</span>
                  <button onClick={copyImproved}
                    style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 11, color: "#1A1A1A",
                      background: "none", cursor: "pointer", border: "1px solid #314550", borderRadius: 6, padding: "4px 9px" }}>
                    <i className={`ti ${copied ? "ti-check" : "ti-copy"}`} style={{ fontSize: 12 }} />
                    {copied ? "Copied" : "Copy"}
                  </button>
                </div>
                <pre style={{ margin: "0 0 12px", fontFamily: "monospace", fontSize: 12, lineHeight: 1.7,
                  whiteSpace: "pre-wrap", wordBreak: "break-word",
                  background: "#F4F3F0", borderRadius: 6, padding: "12px 14px", color: "#314550" }}>
                  {result.improved_story}
                </pre>
                {result.suggested_acs?.length > 0 && (<>
                  <div style={{ fontSize: 12, fontWeight: 500, color: "#053057", marginBottom: 8 }}>Suggested acceptance criteria</div>
                  {result.suggested_acs.map((ac, i) => (
                    <div key={i} style={{ display: "flex", gap: 8, padding: "7px 0",
                      borderBottom: i < result.suggested_acs.length - 1 ? "1px solid #f4f6f8" : "none" }}>
                      <i className="ti ti-circle-check" style={{ fontSize: 14, color: "#1D9E75", marginTop: 2, flexShrink: 0 }} />
                      <span style={{ fontSize: 13, color: "#314550", lineHeight: 1.6 }}>{ac}</span>
                    </div>
                  ))}
                </>)}
                {result.split_suggestions?.length > 0 && (<>
                  <div style={{ fontSize: 12, fontWeight: 500, color: "#053057", marginTop: 14, marginBottom: 8, display: "flex", alignItems: "center", gap: 6 }}>
                    <i className="ti ti-scissors" style={{ fontSize: 13, color: "#EF9F27" }} />
                    Suggested split — this story may be too large for a single sprint
                  </div>
                  {result.split_suggestions.map((s, i) => (
                    <div key={i} style={{ display: "flex", gap: 8, padding: "7px 0",
                      borderBottom: i < result.split_suggestions.length - 1 ? "1px solid #f4f6f8" : "none" }}>
                      <span style={{ fontSize: 12, fontWeight: 500, color: "#EF9F27", minWidth: 18 }}>{i + 1}.</span>
                      <span style={{ fontSize: 13, color: "#314550", lineHeight: 1.6 }}>{s}</span>
                    </div>
                  ))}
                </>)}
              </div>
            )}

          </div>

          {/* Footer */}
          <div style={{ borderTop: "1px solid #314550", padding: "10px 16px", display: "flex", alignItems: "center",
            background: "#F4F3F0" }}>
            <span style={{ fontSize: 12, color: criticalCount > 0 ? "#A32D2D" : "#0F6E56" }}>
              {criticalCount > 0
                ? <><i className="ti ti-alert-circle" style={{ fontSize: 13, marginRight: 5 }} />{criticalCount} blocker{criticalCount > 1 ? "s" : ""} must be resolved before sprint planning</>
                : <><i className="ti ti-circle-check" style={{ fontSize: 13, marginRight: 5 }} />No blockers — story is good to go</>}
            </span>
          </div>
        </div>
      );
    }

    /* ── Batch Analysis (Batch Screen 2) ── */
    function BatchAnalysis({ selection, onChangeBoard }) {
      const { board, type, label, sprintId } = selection;
      const [issues,      setIssues]      = useState([]);
      const [loading,     setLoading]     = useState(true);
      const [selected,    setSelected]    = useState(new Set());
      const [results,     setResults]     = useState({});
      const [statuses,    setStatuses]    = useState({});
      const [running,     setRunning]     = useState(false);
      const [expandedKey, setExpandedKey] = useState(null);
      const [storyPage,   setStoryPage]   = useState(1);
      const [pageSize,    setPageSize]    = useState(25);
      const runningRef = useRef(false);
      const PAGE_SIZE_OPTIONS = [10, 25, 50, "All"];

      useEffect(() => {
        const url = sprintId
          ? `/api/jira/board-issues?sprintId=${sprintId}`
          : `/api/jira/board-issues?boardId=${board.id}&backlog=true`;
        fetch(url)
          .then(r => r.json())
          .then(d => {
            const iss = d.issues || [];
            setIssues(iss);
            setSelected(new Set(iss.map(i => i.key)));
            setLoading(false);
          })
          .catch(e => { console.error(e); setLoading(false); });
      }, []);

      async function runBatch() {
        if (running) return;
        runningRef.current = true;
        setRunning(true);
        const toRun = issues.filter(i => selected.has(i.key) && statuses[i.key] !== "done");
        for (let idx = 0; idx < toRun.length; idx++) {
          if (!runningRef.current) break;
          const issue = toRun[idx];
          setStatuses(s => ({ ...s, [issue.key]: "running" }));
          try {
            const mode = (issue.type || "").toLowerCase() === "epic" ? "epic" : "story";
            const res  = await fetch("/api/analyze", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ story: issue.text, mode }),
            });
            const data = await res.json();
            if (res.ok) {
              setResults(r => ({ ...r, [issue.key]: data }));
              setStatuses(s => ({ ...s, [issue.key]: "done" }));
            } else {
              setStatuses(s => ({ ...s, [issue.key]: "error" }));
            }
          } catch {
            setStatuses(s => ({ ...s, [issue.key]: "error" }));
          }
        }
        runningRef.current = false;
        setRunning(false);
      }

      function toggleSelect(key) {
        setSelected(s => { const n = new Set(s); n.has(key) ? n.delete(key) : n.add(key); return n; });
      }
      function toggleAll() {
        setSelected(selected.size === issues.length ? new Set() : new Set(issues.map(i => i.key)));
      }

      /* ── derived stats ── */
      const selectedCount    = issues.filter(i => selected.has(i.key)).length;
      const doneCount        = Object.values(statuses).filter(s => s === "done").length;
      const activeIssue      = issues.find(i => statuses[i.key] === "running");
      const activeIdx        = activeIssue ? issues.filter(i => selected.has(i.key)).indexOf(activeIssue) + 1 : 0;
      const sprintReadyCount = Object.values(results).filter(r => r.readiness_level === "Sprint Ready").length;
      const criticalGaps     = Object.values(results).reduce((n, r) => n + (r.gaps?.filter(g => g.severity === "critical").length || 0), 0);
      const progressPct      = selectedCount > 0 ? Math.round((doneCount / selectedCount) * 100) : 0;
      const batchStarted     = running || doneCount > 0;

      /* ── helpers ── */
      const RC2 = { "Not Ready": { color: "#A32D2D", bg: "#FCEBEB" }, "Needs Work": { color: "#854F0B", bg: "#FAEEDA" }, "Almost Ready": { color: "#053057", bg: "#A2F3F3" }, "Sprint Ready": { color: "#0F6E56", bg: "#E1F5EE" } };
      const sc2 = v => v >= 80 ? "#1D9E75" : v >= 60 ? "#378ADD" : v >= 40 ? "#EF9F27" : "#E24B4A";
      const SEV2 = { critical: { color: "#A32D2D", bg: "#FCEBEB", border: "#F09595" }, warning: { color: "#854F0B", bg: "#FAEEDA", border: "#EF9F27" }, info: { color: "#053057", bg: "#A2F3F3", border: "#A2F3F3" } };
      const DIM_LABELS = { completeness: "Completeness", clarity: "Clarity", testability: "Testability", size: "Size", dependency_risk: "Dependencies" };

      /* ── SVG score rings ── */
      function DoneRing({ score }) {
        const S = 40, r = 16, circ = 2 * Math.PI * r;
        const arc = (score / 100) * circ;
        const c = sc2(score);
        return (
          <svg width={S} height={S} style={{ display: "block", margin: "0 auto" }}>
            <circle cx={S/2} cy={S/2} r={r} fill="none" stroke="#F4F3F0" strokeWidth={3} />
            <circle cx={S/2} cy={S/2} r={r} fill="none" stroke={c} strokeWidth={3}
              strokeDasharray={`${arc} ${circ - arc}`} strokeLinecap="round"
              transform={`rotate(-90 ${S/2} ${S/2})`} />
            <text x={S/2} y={S/2 + 4} textAnchor="middle" fontSize="11" fontWeight="600" fill={c}>{score}</text>
          </svg>
        );
      }
      function SpinnerRing() {
        const S = 40, r = 16, circ = 2 * Math.PI * r;
        return (
          <svg width={S} height={S} style={{ display: "block", margin: "0 auto", animation: "spin 0.9s linear infinite" }}>
            <circle cx={S/2} cy={S/2} r={r} fill="none" stroke="#F4F3F0" strokeWidth={3} />
            <circle cx={S/2} cy={S/2} r={r} fill="none" stroke="#053057" strokeWidth={3}
              strokeDasharray={`${circ * 0.28} ${circ * 0.72}`} strokeLinecap="round"
              transform={`rotate(-90 ${S/2} ${S/2})`} />
          </svg>
        );
      }
      function DashedRing() {
        const S = 40, r = 16;
        return (
          <svg width={S} height={S} style={{ display: "block", margin: "0 auto", opacity: 0.3 }}>
            <circle cx={S/2} cy={S/2} r={r} fill="none" stroke="#314550" strokeWidth={2.5} strokeDasharray="3.5 4" />
          </svg>
        );
      }
      function ErrorRing() {
        const S = 40, r = 16;
        return (
          <svg width={S} height={S} style={{ display: "block", margin: "0 auto" }}>
            <circle cx={S/2} cy={S/2} r={r} fill="none" stroke="#F09595" strokeWidth={2.5} />
            <text x={S/2} y={S/2 + 4} textAnchor="middle" fontSize="11" fill="#A32D2D">!</text>
          </svg>
        );
      }

      if (loading) return (
        <div style={{ padding: "48px 24px", textAlign: "center", color: "var(--color-text-secondary)", fontSize: 13 }}>
          <i className="ti ti-loader-2" style={{ fontSize: 28, display: "block", marginBottom: 10, animation: "spin 1s linear infinite", color: "#053057" }} />
          Loading issues from {label}…
        </div>
      );

      return (
        <div style={{ background: "#fff", minHeight: 400 }}>

          {/* ── Top header ── */}
          <div style={{ padding: "14px 20px", borderBottom: "1px solid #314550",
            display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 10 }}>
            <div>
              <h2 style={{ fontSize: 18, fontWeight: 500, color: "#053057", margin: "0 0 3px" }}>{board.projectName || board.name}</h2>
              <p style={{ fontSize: 13, color: "#1A1A1A", margin: 0 }}>{label} · {issues.length} issues</p>
            </div>
            <button onClick={onChangeBoard}
              style={{ fontSize: 12, padding: "6px 12px", border: "1px solid #314550",
                borderRadius: 6, background: "none", cursor: "pointer",
                color: "#1A1A1A", display: "flex", alignItems: "center", gap: 5 }}>
              <i className="ti ti-arrow-left" style={{ fontSize: 12 }} /> Change board
            </button>
          </div>

          {/* ── Live progress banner (replaces plain selection bar when running) ── */}
          {batchStarted ? (
            <div style={{ background: running ? "#F4F3F0" : "#F4F3F0", borderBottom: "1px solid #314550" }}>
              {/* Progress bar */}
              <div style={{ height: 3, background: "#F4F3F0" }}>
                <div style={{ height: "100%", width: `${progressPct}%`, transition: "width 0.5s ease",
                  background: running ? "linear-gradient(90deg,#053057,#00EDED)" : "#1D9E75" }} />
              </div>
              <div style={{ padding: "11px 20px", display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
                {/* Left: check + count */}
                <label style={{ display: "flex", alignItems: "center", gap: 7, cursor: "pointer", userSelect: "none" }}>
                  <input type="checkbox"
                    checked={selected.size === issues.length && issues.length > 0}
                    onChange={toggleAll} disabled={running}
                    style={{ width: 14, height: 14, accentColor: "#053057" }} />
                  <span style={{ fontSize: 13, fontWeight: 500, color: "#053057" }}>
                    {selectedCount} of {issues.length} selected
                  </span>
                </label>
                {/* Middle: live status text */}
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  {running && (
                    <span style={{ fontSize: 12, fontWeight: 500, color: "#053057",
                      display: "inline-flex", alignItems: "center", gap: 6 }}>
                      <svg width="14" height="14" style={{ animation: "spin 0.9s linear infinite", flexShrink: 0 }}>
                        <circle cx="7" cy="7" r="5" fill="none" stroke="#F4F3F0" strokeWidth="2.5" />
                        <circle cx="7" cy="7" r="5" fill="none" stroke="#053057" strokeWidth="2.5"
                          strokeDasharray="8 23" strokeLinecap="round" transform="rotate(-90 7 7)" />
                      </svg>
                      Analysing {activeIdx}/{selectedCount}…
                    </span>
                  )}
                  {!running && doneCount > 0 && (
                    <span style={{ fontSize: 12, fontWeight: 500, color: "#0F6E56",
                      display: "inline-flex", alignItems: "center", gap: 5 }}>
                      <i className="ti ti-circle-check" style={{ fontSize: 14 }} />
                      Batch complete — {doneCount}/{selectedCount} analysed
                    </span>
                  )}
                </div>
                {/* Right: run button */}
                <div style={{ marginLeft: "auto" }}>
                  <button onClick={runBatch} disabled={running || selectedCount === 0}
                    style={{ display: "inline-flex", alignItems: "center", gap: 7, fontSize: 13, fontWeight: 500,
                      padding: "7px 16px", borderRadius: 7, border: "none",
                      cursor: running || selectedCount === 0 ? "not-allowed" : "pointer",
                      background: running ? "#314550" : "#053057", color: "#fff" }}>
                    {running
                      ? <><i className="ti ti-loader-2" style={{ fontSize: 13, animation: "spin 1s linear infinite" }} /> Running batch…</>
                      : <><i className="ti ti-refresh" style={{ fontSize: 13 }} /> Re-run</>}
                  </button>
                </div>
              </div>
            </div>
          ) : (
            /* ── Pre-run selection bar ── */
            <div style={{ padding: "11px 20px", borderBottom: "1px solid #314550",
              display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
              <label style={{ display: "flex", alignItems: "center", gap: 7, cursor: "pointer", userSelect: "none" }}>
                <input type="checkbox"
                  checked={selected.size === issues.length && issues.length > 0}
                  onChange={toggleAll}
                  style={{ width: 14, height: 14, accentColor: "#053057" }} />
                <span style={{ fontSize: 13, fontWeight: 500, color: "#053057" }}>
                  {selectedCount} of {issues.length} selected
                </span>
              </label>
              <div style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 10 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
                  <span style={{ fontSize: 11, color: "#1A1A1A" }}>Show:</span>
                  {PAGE_SIZE_OPTIONS.map(opt => (
                    <button key={opt} onClick={() => { setPageSize(opt); setStoryPage(1); setExpandedKey(null); }}
                      style={{ padding: "4px 9px", fontSize: 11, borderRadius: 5, cursor: "pointer",
                        border: "1px solid #314550",
                        background: pageSize === opt ? "#053057" : "#F4F3F0",
                        color: pageSize === opt ? "#FFFFFF" : "#053057",
                        fontWeight: pageSize === opt ? 600 : 400 }}>{opt}</button>
                  ))}
                </div>
                <button onClick={runBatch} disabled={selectedCount === 0}
                  style={{ display: "inline-flex", alignItems: "center", gap: 7, fontSize: 13, fontWeight: 500,
                    padding: "8px 18px", borderRadius: 8, border: "none",
                    cursor: selectedCount === 0 ? "not-allowed" : "pointer",
                    background: selectedCount === 0 ? "#314550" : "#053057", color: "#fff" }}>
                  <i className="ti ti-sparkles" style={{ fontSize: 13 }} /> Run batch
                </button>
              </div>
            </div>
          )}

          {/* ── Real-time summary strip ── */}
          {batchStarted && (
            <div style={{ display: "flex", background: "#F4F3F0", borderBottom: "1px solid #314550" }}>
              {[
                { val: `${doneCount}/${selectedCount}`, sub: "Analysed",     color: "#053057", icon: "ti-chart-bar" },
                { val: sprintReadyCount,                sub: "Sprint ready",  color: "#0F6E56", icon: "ti-circle-check" },
                { val: criticalGaps,                    sub: "Critical gaps", color: criticalGaps > 0 ? "#A32D2D" : "#1A1A1A", icon: "ti-alert-circle" },
              ].map((s, i) => (
                <div key={i} style={{ flex: 1, textAlign: "center", padding: "14px 0",
                  borderRight: i < 2 ? "1px solid #314550" : "none" }}>
                  <div style={{ fontSize: 24, fontWeight: 700, color: s.color, lineHeight: 1 }}>{s.val}</div>
                  <div style={{ fontSize: 11, color: "#1A1A1A", marginTop: 4, display: "flex", alignItems: "center", justifyContent: "center", gap: 4 }}>
                    <i className={`ti ${s.icon}`} style={{ fontSize: 11 }} />{s.sub}
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* ── Table ── */}
          {issues.length === 0 ? (
            <div style={{ padding: "48px 24px", textAlign: "center", color: "#1A1A1A", fontSize: 13 }}>
              No issues found in this {type}.
            </div>
          ) : (
            <>
            <div style={{ background: "#fff", border: "1px solid #314550", borderRadius: 10, overflow: "hidden", margin: "0" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
              <thead>
                <tr style={{ background: "#F4F3F0" }}>
                  <th style={{ width: 42, padding: "9px 16px", borderBottom: "1px solid #314550" }} />
                  <th style={{ textAlign: "left", padding: "9px 12px", fontSize: 11, fontWeight: 500, color: "#1A1A1A", borderBottom: "1px solid #314550", whiteSpace: "nowrap" }}>ID</th>
                  <th style={{ textAlign: "left", padding: "9px 12px", fontSize: 11, fontWeight: 500, color: "#1A1A1A", borderBottom: "1px solid #314550" }}>TITLE</th>
                  <th style={{ textAlign: "right", padding: "9px 12px", fontSize: 11, fontWeight: 500, color: "#1A1A1A", borderBottom: "1px solid #314550", width: 60, whiteSpace: "nowrap" }}>PTS</th>
                  <th style={{ textAlign: "center", padding: "9px 12px", fontSize: 11, fontWeight: 500, color: "#1A1A1A", borderBottom: "1px solid #314550", width: 60 }}>SCORE</th>
                  <th style={{ textAlign: "left", padding: "9px 12px", fontSize: 11, fontWeight: 500, color: "#1A1A1A", borderBottom: "1px solid #314550", width: 130 }}>STATUS</th>
                  <th style={{ width: 36, borderBottom: "1px solid #314550" }} />
                </tr>
              </thead>
              <tbody>
                {(pageSize === "All" ? issues : issues.slice((storyPage - 1) * pageSize, storyPage * pageSize)).map(issue => {
                  const st     = statuses[issue.key] || "pending";
                  const result = results[issue.key];
                  const rc     = result ? (RC2[result.readiness_level] || RC2["Needs Work"]) : null;
                  const isExp  = expandedKey === issue.key;
                  const isSel  = selected.has(issue.key);
                  const isEpic = (issue.type || "").toLowerCase() === "epic";
                  const queued = isSel && !batchStarted ? false : (isSel && batchStarted && st === "pending");

                  const rows = [
                    <tr key={issue.key}
                      style={{ borderBottom: isExp ? "none" : "1px solid #f4f6f8",
                        background: st === "running" ? "#F4F3F0" : isExp ? "#F4F3F0" : "#fff",
                        cursor: "pointer", transition: "background 200ms" }}
                      onClick={() => setExpandedKey(isExp ? null : issue.key)}
                      onMouseEnter={e => { if (st !== "running") e.currentTarget.style.background = "#F4F3F0"; }}
                      onMouseLeave={e => { e.currentTarget.style.background = st === "running" ? "#F4F3F0" : isExp ? "#F4F3F0" : "#fff"; }}>
                      {/* Checkbox */}
                      <td style={{ padding: "11px 16px", textAlign: "center" }} onClick={e => e.stopPropagation()}>
                        <input type="checkbox" checked={isSel} disabled={running}
                          onChange={() => toggleSelect(issue.key)}
                          style={{ width: 14, height: 14, accentColor: "#053057" }} />
                      </td>
                      {/* Key + type */}
                      <td style={{ padding: "11px 12px", whiteSpace: "nowrap" }}>
                        <span style={{ fontSize: 11, fontWeight: 600, color: "#053057", background: "#A2F3F3", padding: "2px 7px", borderRadius: 5 }}>{issue.key}</span>
                        <span style={{ display: "inline-block", marginLeft: 5 }}>
                          {isEpic
                            ? <span style={{ fontSize: 10, fontWeight: 500, padding: "2px 8px", borderRadius: 99, background: "#EDE9FE", color: "#5B21B6", display: "inline-flex", alignItems: "center", gap: 4 }}><i className="ti ti-map" style={{ fontSize: 9 }} />epic</span>
                            : <span style={{ fontSize: 10, fontWeight: 500, padding: "2px 8px", borderRadius: 99, background: "#A2F3F3", color: "#053057", display: "inline-flex", alignItems: "center", gap: 4 }}><i className="ti ti-sparkles" style={{ fontSize: 9 }} />story</span>}
                        </span>
                      </td>
                      {/* Title */}
                      <td style={{ padding: "11px 12px", color: "#053057", maxWidth: 280 }}>
                        <div style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", textDecoration: "underline" }}>{issue.summary}</div>
                        {issue.assignee && <div style={{ fontSize: 11, color: "#1A1A1A", marginTop: 1 }}>{issue.assignee}</div>}
                      </td>
                      {/* Points */}
                      <td style={{ padding: "11px 12px", textAlign: "right", color: "#1A1A1A", fontSize: 12, whiteSpace: "nowrap" }}>
                        {issue.points != null ? `${issue.points} pts` : "—"}
                      </td>
                      {/* Score ring */}
                      <td style={{ padding: "6px 12px", textAlign: "center", verticalAlign: "middle" }}>
                        {st === "done" && result ? <DoneRing score={result.total} />
                          : st === "running"     ? <SpinnerRing />
                          : st === "error"       ? <ErrorRing />
                          : <DashedRing />}
                      </td>
                      {/* Status */}
                      <td style={{ padding: "11px 12px" }}>
                        {st === "done" && result ? (
                          <span style={{ fontSize: 11, fontWeight: 500, padding: "2px 8px", borderRadius: 99,
                            background: rc.bg, color: rc.color, whiteSpace: "nowrap" }}>
                            {result.readiness_level}
                          </span>
                        ) : st === "running" ? (
                          <span style={{ fontSize: 11, color: "#053057", fontWeight: 500 }}>Analysing…</span>
                        ) : st === "error" ? (
                          <span style={{ fontSize: 11, color: "#A32D2D" }}>Error</span>
                        ) : isSel ? (
                          <span style={{ fontSize: 11, color: "#1A1A1A" }}>Queued</span>
                        ) : (
                          <span style={{ fontSize: 11, color: "#1A1A1A", fontStyle: "italic" }}>Skipped</span>
                        )}
                      </td>
                      {/* Expand chevron — always shown */}
                      <td style={{ padding: "11px 12px", textAlign: "center" }} onClick={e => e.stopPropagation()}>
                        <button onClick={() => setExpandedKey(isExp ? null : issue.key)}
                          style={{ background: "none", border: "none", cursor: "pointer",
                            color: "#1A1A1A", padding: "2px 4px", borderRadius: 4, transition: "color 120ms" }}
                          onMouseEnter={e => e.currentTarget.style.color = "#053057"}
                          onMouseLeave={e => e.currentTarget.style.color = "#1A1A1A"}>
                          <i className={`ti ti-chevron-${isExp ? "up" : "right"}`} style={{ fontSize: 14 }} />
                        </button>
                      </td>
                    </tr>
                  ];

                  if (isExp) {
                    rows.push(
                      <tr key={issue.key + "-exp"}>
                        <td colSpan={7} style={{ padding: 0, borderBottom: "1px solid #314550" }}>

                          {/* ── Jira info header (always shown) ── */}
                          <div style={{ padding: "16px 20px", background: "#fff", borderBottom: "1px solid #314550" }}>
                            {/* Meta pills row */}
                            <div style={{ display: "flex", flexWrap: "wrap", gap: 7, marginBottom: issue.text ? 14 : 0 }}>
                              <span style={{ fontSize: 11, fontWeight: 600, padding: "3px 9px", borderRadius: 99,
                                background: "#F4F3F0", color: "#053057", fontFamily: "monospace" }}>{issue.key}</span>
                              {issue.type && (
                                <span style={{ fontSize: 11, fontWeight: 500, padding: "3px 9px", borderRadius: 99,
                                  background: isEpic ? "#EDE9FE" : "#A2F3F3",
                                  color: isEpic ? "#5B21B6" : "#053057", display: "inline-flex", alignItems: "center", gap: 4 }}>
                                  <i className={`ti ${isEpic ? "ti-map" : "ti-sparkles"}`} style={{ fontSize: 10 }} />{issue.type}
                                </span>
                              )}
                              {issue.status && (
                                <span style={{ fontSize: 11, fontWeight: 500, padding: "3px 9px", borderRadius: 99,
                                  background: "#F4F3F0", color: "#314550", display: "inline-flex", alignItems: "center", gap: 4 }}>
                                  <i className="ti ti-circle-dot" style={{ fontSize: 10 }} />{issue.status}
                                </span>
                              )}
                              {issue.priority && (
                                <span style={{ fontSize: 11, fontWeight: 500, padding: "3px 9px", borderRadius: 99,
                                  background: "#FFF8EC", color: "#854F0B", display: "inline-flex", alignItems: "center", gap: 4 }}>
                                  <i className="ti ti-flag" style={{ fontSize: 10 }} />{issue.priority}
                                </span>
                              )}
                              {issue.points != null && (
                                <span style={{ fontSize: 11, fontWeight: 500, padding: "3px 9px", borderRadius: 99,
                                  background: "#E1F5EE", color: "#0F6E56", display: "inline-flex", alignItems: "center", gap: 4 }}>
                                  <i className="ti ti-calculator" style={{ fontSize: 10 }} />{issue.points} pts
                                </span>
                              )}
                              {issue.assignee && (
                                <span style={{ fontSize: 11, padding: "3px 9px", borderRadius: 99,
                                  background: "#F4F3F0", color: "#1A1A1A", display: "inline-flex", alignItems: "center", gap: 4 }}>
                                  <i className="ti ti-user" style={{ fontSize: 10 }} />{issue.assignee}
                                </span>
                              )}
                            </div>
                            {/* Description */}
                            {issue.text && (
                              <div>
                                <div style={{ fontSize: 10, fontWeight: 600, letterSpacing: "0.07em",
                                  textTransform: "uppercase", color: "#1A1A1A", marginBottom: 7 }}>
                                  {isEpic ? "Epic description" : "Story description"}
                                </div>
                                <pre style={{ margin: 0, fontFamily: "var(--font-mono)", fontSize: 12, lineHeight: 1.75,
                                  whiteSpace: "pre-wrap", wordBreak: "break-word",
                                  background: "#F4F3F0", border: "1px solid #314550", borderRadius: 7,
                                  padding: "11px 14px", color: "#314550", maxHeight: 220, overflowY: "auto" }}>
                                  {issue.text}
                                </pre>
                              </div>
                            )}
                          </div>

                          {/* ── Analysis (if done) or status placeholder ── */}
                          {result ? (
                            <StoryPanel
                              selectedStory={{
                                mode:       isEpic ? "epic" : "story",
                                title:      issue.summary,
                                story_text: issue.text,
                                score:      result.total,
                                result,
                              }}
                              onBack={() => setExpandedKey(null)}
                              onRecheck={() => {}}
                            />
                          ) : (
                            <div style={{ padding: "14px 20px", background: "#F4F3F0",
                              display: "flex", alignItems: "center", gap: 8, color: "#1A1A1A", fontSize: 12 }}>
                              {st === "running"
                                ? <><svg width="14" height="14" style={{ animation: "spin 0.9s linear infinite", flexShrink: 0 }}>
                                    <circle cx="7" cy="7" r="5" fill="none" stroke="#F4F3F0" strokeWidth="2.5" />
                                    <circle cx="7" cy="7" r="5" fill="none" stroke="#053057" strokeWidth="2.5"
                                      strokeDasharray="8 23" strokeLinecap="round" transform="rotate(-90 7 7)" />
                                  </svg>
                                  <span style={{ color: "#053057", fontWeight: 500 }}>Analysing this story…</span></>
                                : <><i className="ti ti-sparkles" style={{ fontSize: 14 }} />
                                    {isSel ? "Queued — run the batch to see readiness scores." : "Select this story and run the batch to analyse it."}</>}
                            </div>
                          )}
                        </td>
                      </tr>
                    );
                  }
                  return rows;
                })}
              </tbody>
            </table>
            </div>
          {pageSize !== "All" && Math.ceil(issues.length / pageSize) > 1 && (() => {
            const totalPages = Math.ceil(issues.length / pageSize);
            return (
              <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 6, padding: "14px 0 4px", background: "#fff", borderTop: "1px solid #314550" }}>
                <button onClick={() => { setStoryPage(p => Math.max(1, p - 1)); setExpandedKey(null); }} disabled={storyPage === 1}
                  style={{ padding: "5px 10px", fontSize: 12, border: "0.5px solid #314550", borderRadius: 6,
                    background: "none", cursor: storyPage === 1 ? "default" : "pointer",
                    color: storyPage === 1 ? "#314550" : "#053057" }}>‹ Prev</button>
                {Array.from({ length: totalPages }, (_, ii) => ii + 1).map(p => (
                  <button key={p} onClick={() => { setStoryPage(p); setExpandedKey(null); }}
                    style={{ padding: "5px 9px", fontSize: 12, border: "0.5px solid #314550", borderRadius: 6,
                      cursor: "pointer", background: p === storyPage ? "#053057" : "#F4F3F0",
                      color: p === storyPage ? "#FFFFFF" : "#053057" }}>{p}</button>
                ))}
                <button onClick={() => { setStoryPage(p => Math.min(totalPages, p + 1)); setExpandedKey(null); }} disabled={storyPage === totalPages}
                  style={{ padding: "5px 10px", fontSize: 12, border: "0.5px solid #314550", borderRadius: 6,
                    background: "none", cursor: storyPage === totalPages ? "default" : "pointer",
                    color: storyPage === totalPages ? "#314550" : "#053057" }}>Next ›</button>
              </div>
            );
          })()}
            </>
          )}
        </div>
      );
    }

    /* ── Main App ── */
    function App() {
      const [activeNav, setActiveNav]     = useState("checker");
      const [checkerMode, setCheckerMode] = useState("story"); // "story" | "epic"
      const [story, setStory]             = useState("");
      const [epic, setEpic]               = useState("");
      const [dor, setDor]                 = useState("");

      // "idle" | "loading" | "done" | "error"
      const [uiState, setUiState]     = useState("idle");
      const [loadStep, setLoadStep]   = useState(0);
      const [result, setResult]       = useState(null);
      const [errorMsg, setErrorMsg]   = useState("");
      const [history, setHistory]     = useState([]);

      useEffect(() => {
        fetch("/api/history").then(r => r.json()).then(setHistory).catch(() => {});
      }, []);

      const resultRef = useRef(null);
      const timerRef  = useRef(null);

      // Advance loading steps every ~1.8s
      useEffect(() => {
        if (uiState === "loading") {
          setLoadStep(0);
          timerRef.current = setInterval(() => {
            setLoadStep(s => Math.min(s + 1, LOADING_STEPS.length - 1));
          }, 1800);
        } else {
          clearInterval(timerRef.current);
        }
        return () => clearInterval(timerRef.current);
      }, [uiState]);

      async function analyzeStory() {
        if (!story.trim()) return;
        setUiState("loading");
        setResult(null);
        setErrorMsg("");

        try {
          const res = await fetch("/api/analyze", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ story, epic, dor, mode: checkerMode }),
          });
          const data = await res.json();
          if (!res.ok) {
            throw new Error(data.error || `Request failed (${res.status})`);
          }
          setResult(data);
          setUiState("done");
          fetch("/api/history").then(r => r.json()).then(setHistory).catch(() => {});
          setTimeout(() => resultRef.current?.scrollIntoView({ behavior: "smooth", block: "start" }), 120);
        } catch (e) {
          setErrorMsg(e.message || "");
          setUiState("error");
        }
      }

      const [batchSelection, setBatchSelection] = useState(null);
      const [checkerTab, setCheckerTab] = useState("single"); // "single" | "batch"

      const navTabs = [
        { id: "checker",   label: "Readiness Checker", icon: "ti-sparkles" },
        { id: "dashboard", label: "Dashboard",         icon: "ti-layout-dashboard" },
      ];

      return (
        <div style={{ fontFamily: "var(--font-sans)", background: "var(--color-background-primary)",
          border: "0.5px solid var(--color-border-secondary)", borderRadius: "var(--border-radius-lg)",
          overflow: "hidden" }}>
          <h2 className="sr-only">User story readiness checker</h2>

          {/* Top nav */}
          <nav style={{ display: "flex", alignItems: "center", background: "#053057", borderBottom: "1px solid #314550" }}>
            <a href="/" style={{ display: "flex", alignItems: "center", gap: 7, padding: "12px 18px",
              fontSize: 13, color: "#A2F3F3", textDecoration: "none",
              borderRight: "1px solid #314550", flexShrink: 0 }}>
              <i className="ti ti-home" style={{ fontSize: 15 }} /> Home
            </a>
            {navTabs.map(t => (
              <button key={t.id} onClick={() => setActiveNav(t.id)}
                style={{ display: "flex", alignItems: "center", gap: 7,
                  padding: activeNav === t.id ? "10px 18px" : "10px 18px",
                  fontSize: 13, fontWeight: activeNav === t.id ? 700 : 400,
                  color: activeNav === t.id ? "#053057" : "#A2F3F3",
                  background: activeNav === t.id ? "#00EDED" : "transparent",
                  border: "none", borderRadius: activeNav === t.id ? 7 : 0,
                  margin: activeNav === t.id ? "4px 0 4px 8px" : "0",
                  cursor: "pointer" }}>
                <i className={`ti ${t.icon}`} style={{ fontSize: 15 }} />
                {t.label}
              </button>
            ))}
          </nav>

          {/* Checker view */}
          {activeNav === "checker" && (
            <div>

              {/* ── Single / Batch sub-tab bar ── */}
              <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "12px 20px",
                borderBottom: "1px solid #314550", background: "#fff" }}>
                {[
                  { id: "single", label: "Single story", icon: "ti-sparkles" },
                  { id: "batch",  label: "Batch analysis", icon: "ti-stack-2" },
                ].map(t => (
                  <button key={t.id} onClick={() => setCheckerTab(t.id)}
                    style={{ display: "inline-flex", alignItems: "center", gap: 6,
                      padding: "7px 16px", borderRadius: 99, fontSize: 13, fontWeight: checkerTab === t.id ? 500 : 400,
                      border: "none", cursor: "pointer",
                      background: checkerTab === t.id ? "#A2F3F3" : "none",
                      color: checkerTab === t.id ? "#053057" : "#1A1A1A" }}>
                    <i className={`ti ${t.icon}`} style={{ fontSize: 13 }} />
                    {t.label}
                  </button>
                ))}
              </div>

              {/* ── Batch sub-tab ── */}
              {checkerTab === "batch" && (
                batchSelection
                  ? <BatchAnalysis selection={batchSelection} onChangeBoard={() => setBatchSelection(null)} />
                  : <BoardSelector onSelect={sel => setBatchSelection(sel)} />
              )}

              {/* ── Single story sub-tab ── */}
              {checkerTab === "single" && (
            <div style={{ padding: "24px 20px", background: "var(--color-background-secondary)" }}>

              <div style={{ marginBottom: 20 }}>
                {/* Mode toggle */}
                <div style={{ display: "inline-flex", border: "0.5px solid var(--color-border-secondary)",
                  borderRadius: "var(--border-radius-md)", overflow: "hidden", marginBottom: 14 }}>
                  {[{ id: "story", label: "User Story", icon: "ti-sparkles" },
                    { id: "epic",  label: "Epic",       icon: "ti-map" }].map(m => (
                    <button key={m.id} onClick={() => { setCheckerMode(m.id); setUiState("idle"); setResult(null); }}
                      style={{ display: "flex", alignItems: "center", gap: 6, padding: "7px 16px",
                        fontSize: 12, border: "none", cursor: "pointer",
                        background: checkerMode === m.id ? "#00EDED" : "none",
                        color: checkerMode === m.id ? "#053057" : "var(--color-text-secondary)" }}>
                      <i className={`ti ${m.icon}`} style={{ fontSize: 13 }} />
                      {m.label}
                    </button>
                  ))}
                </div>
                <h1 style={{ fontSize: 20, fontWeight: 500, color: "#053057", margin: "0 0 4px" }}>
                  {checkerMode === "epic" ? "Check an Epic" : "Check a User Story"}
                </h1>
                <p style={{ fontSize: 13, color: "#1A1A1A", margin: "0 0 4px" }}>
                  {checkerMode === "epic"
                    ? "Paste your epic below and get a readiness score, flagged gaps, and an improved version in seconds."
                    : "Paste your story below and get a readiness score, flagged gaps, and an improved version in seconds."}
                </p>
              </div>

              <div style={{ display: "grid", gridTemplateColumns: "minmax(0,1.55fr) minmax(0,0.45fr)", gap: 16, alignItems: "start" }}>

                {/* Left column */}
                <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>

                  {/* Input card — always visible */}
                  <div style={cardStyle}>
                    <div style={{ padding: "16px 18px 0" }}>
                      <label style={{ display: "block", fontSize: 12, fontWeight: 500,
                        color: "var(--color-text-primary)", marginBottom: 7 }}>
                        {checkerMode === "epic" ? "Paste Epic here below:" : "Paste User Story here below:"}
                      </label>
                      <textarea
                        value={story}
                        onChange={e => setStory(e.target.value)}
                        rows={9}
                        placeholder={checkerMode === "epic"
                          ? `Epic title: [title]\n\nDescription: [what this epic covers]\n\nGoal: [business outcome]\n\nScope:\n- …`
                          : `As a [persona], I want [goal] so that [reason].\n\nAcceptance Criteria:\n- …`}
                        style={{ width: "100%", resize: "vertical", fontSize: 13,
                          fontFamily: "var(--font-mono)", lineHeight: 1.7,
                          background: "var(--color-background-secondary)",
                          border: "0.5px solid var(--color-border-secondary)",
                          borderRadius: "var(--border-radius-md)", padding: "10px 12px",
                          color: "#1A1A1A", boxSizing: "border-box" }}
                      />
                      <div style={{ fontSize: 11, color: "var(--color-text-primary)", textAlign: "right", marginTop: 3, marginBottom: 12 }}>
                        {story.length} chars
                      </div>

                      <div style={{ borderTop: "0.5px solid var(--color-border-tertiary)", paddingTop: 13, marginBottom: 13 }}>
                        <div style={{ fontSize: 12, fontWeight: 500, color: "var(--color-text-primary)", marginBottom: 9 }}>
                          Context <span style={{ fontWeight: 400, color: "var(--color-text-tertiary)" }}>(optional - COMING SOON)</span>
                        </div>
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                          <div>
                            <label style={{ display: "block", fontSize: 11, color: "var(--color-text-primary)", marginBottom: 5 }}>Parent epic</label>
                            <input value={epic} onChange={e => setEpic(e.target.value)}
                              placeholder="e.g. Auth & security epic"
                              style={{ width: "100%", fontSize: 12, padding: "7px 10px", boxSizing: "border-box",
                                background: "var(--color-background-secondary)",
                                border: "0.5px solid var(--color-border-secondary)",
                                borderRadius: "var(--border-radius-md)", color: "var(--color-text-primary)" }} />
                          </div>
                          <div>
                            <label style={{ display: "block", fontSize: 11, color: "var(--color-text-primary)", marginBottom: 5 }}>Definition of Ready</label>
                            <input value={dor} onChange={e => setDor(e.target.value)}
                              placeholder="e.g. GWT ACs, max 8 pts…"
                              style={{ width: "100%", fontSize: 12, padding: "7px 10px", boxSizing: "border-box",
                                background: "var(--color-background-secondary)",
                                border: "0.5px solid var(--color-border-secondary)",
                                borderRadius: "var(--border-radius-md)", color: "var(--color-text-primary)" }} />
                          </div>
                        </div>
                      </div>
                    </div>

                    <div style={{ borderTop: "0.5px solid var(--color-border-tertiary)", padding: "12px 18px",
                      display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                      <button onClick={() => { setStory(EXAMPLE_STORY); setEpic(""); setDor(""); setUiState("idle"); setResult(null); }}
                        style={{ fontSize: 12, padding: "7px 13px", background: "none", cursor: "pointer",
                          border: "0.5px solid var(--color-border-secondary)",
                          borderRadius: "var(--border-radius-md)", color: "var(--color-text-primary)" }}>
                        Load example
                      </button>
                      <button onClick={analyzeStory}
                        disabled={uiState === "loading" || !story.trim()}
                        style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 13, fontWeight: 500,
                          padding: "9px 20px", cursor: uiState === "loading" || !story.trim() ? "not-allowed" : "pointer",
                          background: uiState === "loading" || !story.trim() ? "#314550" : "#053057",
                          color: "#fff", border: "none", borderRadius: "var(--border-radius-md)" }}>
                        {uiState === "loading"
                          ? <><i className="ti ti-loader-2" style={{ fontSize: 15, animation: "spin 0.9s linear infinite" }} aria-hidden="true" /> Analysing…</>
                          : <><i className="ti ti-sparkles" style={{ fontSize: 15 }} aria-hidden="true" /> Check Readiness</>}
                      </button>
                    </div>
                  </div>

                  {/* Dynamic result area */}
                  <div ref={resultRef}>
                    {uiState === "loading" && <LoadingState step={loadStep} />}
                    {uiState === "error"   && <ErrorState message={errorMsg} onRetry={analyzeStory} onEdit={() => setUiState("idle")} />}
                    {uiState === "done" && result && (
                      <ResultState result={result} onRecheck={() => { setUiState("idle"); setResult(null); }} />
                    )}
                  </div>
                </div>

                {/* Right side panel */}
                <SidePanel mode={checkerMode} />
              </div>
            </div>
              )}
            </div>
          )}

          {activeNav === "dashboard" && (
            <Dashboard history={history} setHistory={setHistory}
              onRecheck={row => { setActiveNav("checker"); setStory(row.story_text || ""); setCheckerMode(row.mode || "story"); }} />
          )}

          <style>{`
            @keyframes spin  { from { transform: rotate(0deg) } to { transform: rotate(360deg) } }
            @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.4 } }
            textarea:focus, input:focus { outline: none; border-color: #00EDED !important; box-shadow: 0 0 0 3px rgba(0,237,237,0.15); }
            button:not(:disabled):hover { opacity: 0.88; }
          `}</style>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

  <!-- Compile the JSX above with the classic runtime, then run it -->
  <script>
    (function () {
      try {
        var src = document.getElementById("app-src").textContent;
        var out = Babel.transform(src, {
          presets: [["react", { runtime: "classic" }]],
        }).code;
        (0, eval)(out);
      } catch (err) {
        showError("Failed to compile the UI", (err && err.message) || String(err));
      }
    })();
  </script>
</body>
</html>
