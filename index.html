<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Story Readiness Checker</title>

  <!-- Tabler icons (the `ti ti-*` classes used in the component). Non-critical: if a
       network filter blocks this, the app still works, just without icon glyphs. -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css" />

  <!-- React + Babel served locally by server.py — no browser CDN dependency -->
  <script src="/vendor/react.production.min.js"></script>
  <script src="/vendor/react-dom.production.min.js"></script>
  <script src="/vendor/babel.min.js"></script>

  <style>
    /* Theme for the CSS variables the component references */
    :root {
      --blend-white: #FFFFFF;
      --blend-off-white: #F4F3F0;
      --blend-light-turquoise: #A2F3F3;
      --blend-neon-turquoise: #00EDED;
      --blend-washed-blue: #053057;
      --blend-cool-gray: #314550;
      --blend-gray: #1A1A1A;
      --blend-dark-gray: #0B0D0E;
      
      --color-background-primary: #053057;
      --color-background-secondary: #ffffff;
      --color-border-secondary: #314550;
      --color-border-tertiary: #314550;
      --color-text-primary: #FFFFFF;
      --color-text-secondary: #314550;
      --color-text-tertiary: #314550;
      --border-radius-lg: 12px;
      --border-radius-md: 8px;
      --font-sans: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      --font-mono: 'Fira Code', 'Courier New', monospace;

    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 24px;
      background: #0B0D0E;
      font-family: var(--font-sans);
    }
    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }
    #root { max-width: 1100px; margin: 0 auto; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Surface any error on the page instead of failing to a blank screen -->
  <script>
    function showError(title, detail) {
      var root = document.getElementById("root");
      if (root) {
        root.innerHTML =
          '<div style="max-width:760px;margin:40px auto;padding:20px 24px;border:1px solid #F09595;' +
          'background:#FCEBEB;border-radius:12px;font-family:sans-serif;color:#7a1f1f">' +
          '<div style="font-weight:600;font-size:15px;margin-bottom:8px">' + title + '</div>' +
          '<pre style="white-space:pre-wrap;font-size:12px;margin:0;color:#5a1717">' + detail + '</pre></div>';
      }
    }
    window.addEventListener("error", function (e) {
      showError("A script error occurred", (e.message || e.error || e) + "\n" + (e.filename || ""));
    });
    window.addEventListener("unhandledrejection", function (e) {
      showError("Unhandled promise rejection", (e.reason && e.reason.message) || e.reason || "unknown");
    });
    // Verify the local libraries actually loaded
    window.addEventListener("DOMContentLoaded", function () {
      var missing = [];
      if (typeof React === "undefined") missing.push("React");
      if (typeof ReactDOM === "undefined") missing.push("ReactDOM");
      if (typeof Babel === "undefined") missing.push("Babel");
      if (missing.length) {
        showError("Libraries failed to load: " + missing.join(", "),
          "The /vendor/*.js files did not load. Make sure server.py is running and you opened http://localhost:8000 (not the file directly).");
      }
    });
  </script>

  <!-- type="text/plain" so Babel's auto-runner ignores it; we compile it manually
       below with the CLASSIC runtime (React.createElement) to avoid emitting imports. -->
  <script type="text/plain" id="app-src">
    const { useState, useRef, useEffect } = React;

    const EXAMPLE_STORY = `As a registered user, I want to reset my password so that I can regain access to my account if I forget it.

Acceptance Criteria:
- User can click "Forgot password" on login page
- System sends an email
- User can set a new password`;

    const LOADING_STEPS = [
      { label: "Parsing story format & persona" },
      { label: "Detecting acceptance criteria" },
      { label: "Scoring completeness, clarity, testability…" },
      { label: "Detecting dependency signals" },
      { label: "Generating improved story & ACs" },
    ];

    const SEVERITY_CFG = {
      critical: { color: "#A32D2D", bg: "#FCEBEB", border: "#F09595", label: "Critical", icon: "ti-alert-circle" },
      warning:  { color: "#854F0B", bg: "#FAEEDA", border: "#EF9F27", label: "Warning",  icon: "ti-alert-triangle" },
      info:     { color: "#053057", bg: "#A2F3F3", border: "#A2F3F3", label: "Info",     icon: "ti-info-circle" },
    };

    const CONFIDENCE_CFG = {
      high:   { color: "#A32D2D", bg: "#FCEBEB" },
      medium: { color: "#854F0B", bg: "#FAEEDA" },
      low:    { color: "#053057", bg: "#A2F3F3" },
    };

    const DEP_ICONS = { team: "ti-users", api: "ti-api", story: "ti-git-branch", system: "ti-server" };

    const SCORE_LABELS = {
      completeness: "Completeness", clarity: "Clarity",
      testability: "Testability", size: "Story size", dependency_risk: "Dependency risk",
    };

    const READINESS_CFG = {
      "Not Ready":    { color: "#A32D2D", bg: "#FCEBEB" },
      "Needs Work":   { color: "#854F0B", bg: "#FAEEDA" },
      "Almost Ready": { color: "#053057", bg: "#A2F3F3" },
      "Sprint Ready": { color: "#0F6E56", bg: "#E1F5EE" },
    };

    const RECENT_MOCK = [
      { id: "AUTH-14",  title: "Password reset via email",   score: 38, status: "Not Ready"    },
      { id: "NOTIF-03", title: "Email notify on task assign", score: 91, status: "Sprint Ready" },
      { id: "DASH-07",  title: "PDF export dashboard",        score: 61, status: "Needs Work"   },
    ];

    const scoreColor = v => v >= 16 ? "#1D9E75" : v >= 11 ? "#378ADD" : v >= 6 ? "#EF9F27" : "#E24B4A";

    const cardStyle = {
      background: "var(--color-background-primary)",
      border: "0.5px solid var(--color-border-tertiary)",
      borderRadius: "var(--border-radius-lg)",
      overflow: "hidden",
    };

    const sideTitleStyle = {
      fontSize: 12, fontWeight: 500, color: "var(--color-text-primary)",
      display: "flex", alignItems: "center", gap: 6, marginBottom: 10,
    };

    function StatusPill({ status }) {
      const c = READINESS_CFG[status] || READINESS_CFG["Needs Work"];
      return (
        <span style={{ fontSize: 10, fontWeight: 500, padding: "2px 8px", borderRadius: 99,
          background: c.bg, color: c.color, whiteSpace: "nowrap" }}>{status}</span>
      );
    }

    function ScoreRing({ score, size = 28 }) {
      const c = scoreColor(score);
      const bg = READINESS_CFG[score >= 80 ? "Sprint Ready" : score >= 60 ? "Almost Ready" : score >= 40 ? "Needs Work" : "Not Ready"].bg;
      return (
        <div style={{ width: size, height: size, borderRadius: "50%", border: `2px solid ${c}`,
          background: bg, display: "flex", alignItems: "center", justifyContent: "center",
          fontSize: Math.round(size * 0.33), fontWeight: 500, color: c, flexShrink: 0 }}>
          {score}
        </div>
      );
    }

    /* ── Loading state ── */
    function LoadingState({ step }) {
      return (
        <div style={{ ...cardStyle, marginBottom: 0 }}>
          <div style={{ padding: "16px 18px" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 18 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <div style={{ width: 36, height: 36, borderRadius: "50%",
                  border: "3px solid #A2F3F3", borderTopColor: "#053057",
                  animation: "spin 0.9s linear infinite", flexShrink: 0 }} aria-hidden="true" />
                <div>
                  <div style={{ fontSize: 13, fontWeight: 500, color: "var(--color-text-primary)" }}>Analysing your story…</div>
                  <div style={{ fontSize: 11, color: "var(--color-text-tertiary)", marginTop: 2 }}>This takes about 5–10 seconds</div>
                </div>
              </div>
              <span style={{ fontSize: 11, fontWeight: 500, background: "#A2F3F3", color: "#053057",
                padding: "4px 10px", borderRadius: 99 }}>In progress</span>
            </div>

            {LOADING_STEPS.map((s, i) => {
              const done = i < step;
              const active = i === step;
              return (
                <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, padding: "9px 0",
                  borderBottom: i < LOADING_STEPS.length - 1 ? "0.5px solid var(--color-border-tertiary)" : "none" }}>
                  <div style={{ width: 22, height: 22, borderRadius: "50%", flexShrink: 0, display: "flex",
                    alignItems: "center", justifyContent: "center",
                    background: done ? "#E1F5EE" : active ? "#A2F3F3" : "var(--color-background-secondary)",
                    border: active ? "1.5px solid #A2F3F3" : "none" }}>
                    {done
                      ? <i className="ti ti-check" style={{ fontSize: 12, color: "#1D9E75" }} aria-hidden="true" />
                      : active
                        ? <div style={{ width: 8, height: 8, borderRadius: "50%", background: "#053057",
                            animation: "pulse 1s ease-in-out infinite" }} />
                        : null}
                  </div>
                  <span style={{ fontSize: 12, color: done ? "#0F6E56" : active ? "#053057" : "var(--color-text-tertiary)" }}>
                    {s.label}
                  </span>
                </div>
              );
            })}
          </div>

          <div style={{ borderTop: "0.5px solid var(--color-border-tertiary)", padding: "12px 18px", display: "flex", gap: 10 }}>
            <div style={{ height: 12, borderRadius: 4, background: "var(--color-background-secondary)",
              width: "55%", animation: "pulse 1.4s ease-in-out infinite" }} />
            <div style={{ height: 12, borderRadius: 4, background: "var(--color-background-secondary)",
              width: "25%", animation: "pulse 1.4s ease-in-out infinite" }} />
          </div>
        </div>
      );
    }

    /* ── Error state ── */
    function ErrorState({ onRetry, onEdit, message }) {
      return (
        <div style={{ ...cardStyle }}>
          <div style={{ padding: "36px 24px", display: "flex", flexDirection: "column",
            alignItems: "center", textAlign: "center" }}>
            <div style={{ width: 48, height: 48, borderRadius: "50%", background: "#FCEBEB",
              display: "flex", alignItems: "center", justifyContent: "center", marginBottom: 14 }}>
              <i className="ti ti-alert-circle" style={{ fontSize: 24, color: "#A32D2D" }} aria-hidden="true" />
            </div>
            <div style={{ fontSize: 14, fontWeight: 500, color: "var(--color-text-primary)", marginBottom: 6 }}>
              Analysis failed
            </div>
            <div style={{ fontSize: 13, color: "var(--color-text-secondary)", lineHeight: 1.7,
              marginBottom: 22, maxWidth: 360 }}>
              {message || "Something went wrong while processing your story. Your text is still here — try again or edit the story."}
            </div>
            <div style={{ display: "flex", gap: 10 }}>
              <button onClick={onEdit}
                style={{ fontSize: 13, padding: "8px 16px", background: "none", cursor: "pointer",
                  border: "0.5px solid var(--color-border-secondary)",
                  borderRadius: "var(--border-radius-md)", color: "var(--color-text-secondary)" }}>
                Edit story
              </button>
              <button onClick={onRetry}
                style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 13, padding: "8px 16px",
                  background: "#053057", color: "#fff", border: "none", cursor: "pointer",
                  borderRadius: "var(--border-radius-md)" }}>
                <i className="ti ti-refresh" style={{ fontSize: 14 }} aria-hidden="true" />
                Try again
              </button>
            </div>
          </div>
        </div>
      );
    }

    /* ── Result state ── */
    function ResultState({ result, onRecheck }) {
      const [tab, setTab]           = useState("gaps");
      const [copied, setCopied]     = useState(false);
      const [jiraKey, setJiraKey]   = useState("");
      const [pushing, setPushing]   = useState(false);
      const [pushStatus, setPushStatus] = useState(null); // null | "ok" | "error"
      const [pushMsg, setPushMsg]   = useState("");

      function copyImproved() {
        navigator.clipboard.writeText(result.improved_story || "");
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      }

      function pushToJira() {
        const key = jiraKey.trim().toUpperCase();
        if (!key) { setPushStatus("error"); setPushMsg("Enter a Jira issue key (e.g. PROJ-123)"); return; }
        setPushing(true); setPushStatus(null); setPushMsg("");
        fetch("/api/jira/update-description", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ key, description: result.improved_story || "" }),
        })
        .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, d }; }); })
        .then(function({ ok, d }) {
          if (ok) { setPushStatus("ok"); setPushMsg("Description updated in Jira ✓"); }
          else     { setPushStatus("error"); setPushMsg(d.detail || d.error || "Update failed"); }
          setPushing(false);
        })
        .catch(function(e) { setPushStatus("error"); setPushMsg(e.message); setPushing(false); });
      }

      const resultTabs = [
        { id: "gaps",         label: "Gaps",           icon: "ti-alert-circle",  count: result.gaps?.length },
        { id: "ambiguities",  label: "Ambiguities",     icon: "ti-question-mark", count: result.ambiguities?.length },
        { id: "dependencies", label: "Dependencies",    icon: "ti-git-branch",    count: result.dependencies?.length },
        { id: "improved",     label: "Improved story",  icon: "ti-sparkles",      count: null },
      ];

      const criticalCount = result.gaps?.filter(g => g.severity === "critical").length || 0;
      const rc = READINESS_CFG[result.readiness_level] || READINESS_CFG["Needs Work"];

      return (
        <div style={cardStyle}>
          {/* Score header */}
          <div style={{ padding: "16px 18px" }}>
            <div style={{ display: "flex", gap: 20, alignItems: "flex-start", flexWrap: "wrap" }}>
              <div style={{ minWidth: 130 }}>
                <div style={{ fontSize: 11, fontWeight: 500, textTransform: "uppercase",
                  letterSpacing: "0.05em", color: "var(--color-text-primary)", marginBottom: 6 }}>
                  Readiness score
                </div>
                <div style={{ display: "flex", alignItems: "baseline", gap: 6, marginBottom: 8 }}>
                  <span style={{ fontSize: 44, fontWeight: 500, color: scoreColor(result.total / 5), lineHeight: 1 }}>
                    {result.total}
                  </span>
                  <span style={{ fontSize: 16, color: "var(--color-text-tertiary)" }}>/100</span>
                </div>
                <span style={{ display: "inline-block", fontSize: 11, fontWeight: 500,
                  padding: "4px 12px", borderRadius: 99, background: rc.bg, color: rc.color }}>
                  {result.readiness_level}
                </span>
              </div>

              <div style={{ flex: 1, minWidth: 180 }}>
                {Object.entries(result.scores).map(([k, v]) => (
                  <div key={k} style={{ marginBottom: 7 }}>
                    <div style={{ display: "flex", justifyContent: "space-between",
                      fontSize: 11, color: "var(--color-text-primary)", marginBottom: 3 }}>
                      <span>{SCORE_LABELS[k]}</span>
                      <span style={{ color: scoreColor(v), fontWeight: 500 }}>{v}/20</span>
                    </div>
                    <div style={{ height: 4, background: "var(--color-background-primary)", borderRadius: 99 }}>
                      <div style={{ height: "100%", width: `${Math.round((v / 20) * 100)}%`,
                        background: scoreColor(v), borderRadius: 99,
                        transition: "width 0.7s ease" }} />
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {result.summary && (
              <p style={{ margin: "14px 0 0", fontSize: 13, color: "var(--color-text-primary)",
                lineHeight: 1.7, borderTop: "0.5px solid var(--color-border-tertiary)", paddingTop: 12 }}>
                {result.summary}
              </p>
            )}
          </div>

          {/* Tabs */}
          <div style={{ display: "flex", borderBottom: "0.5px solid var(--color-border-tertiary)",
            borderTop: "0.5px solid var(--color-border-tertiary)", padding: "0 6px",
            background: "var(--color-background-secondary)" }}>
            {resultTabs.map(t => (
              <button key={t.id} onClick={() => setTab(t.id)}
                style={{ display: "flex", alignItems: "center", gap: 5, padding: "9px 12px",
                  fontSize: 12, fontWeight: tab === t.id ? 500 : 400,
                  color: tab === t.id ? "#053057" : "var(--color-text-secondary)",
                  background: "none", border: "none",
                  borderBottom: tab === t.id ? "2px solid #053057" : "2px solid transparent",
                  cursor: "pointer", marginBottom: -1 }}>
                <i className={`ti ${t.icon}`} style={{ fontSize: 13 }} aria-hidden="true" />
                {t.label}
                {t.count > 0 && (
                  <span style={{ fontSize: 10, fontWeight: 500, padding: "1px 6px", borderRadius: 99,
                    background: tab === t.id ? "#A2F3F3" : "var(--color-background-primary)",
                    color: tab === t.id ? "#053057" : "var(--color-text-secondary)" }}>
                    {t.count}
                  </span>
                )}
              </button>
            ))}
          </div>

          {/* Tab content */}
          <div style={{ padding: "16px 18px" }}>

            {tab === "gaps" && (
              <div>
                {!result.gaps?.length
                  ? <p style={{ fontSize: 13, color: "var(--color-text-primary)" }}>No significant gaps detected.</p>
                  : result.gaps.map((g, i) => {
                      const c = SEVERITY_CFG[g.severity] || SEVERITY_CFG.info;
                      return (
                        <div key={i} style={{ border: `0.5px solid ${c.border}`, borderRadius: "var(--border-radius-md)",
                          padding: "11px 13px", marginBottom: 9, background: c.bg }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 7, marginBottom: 5 }}>
                            <i className={`ti ${c.icon}`} style={{ fontSize: 14, color: c.color }} aria-hidden="true" />
                            <span style={{ fontSize: 11, fontWeight: 500, color: c.color }}>{c.label}</span>
                            <span style={{ fontSize: 11, color: c.color, opacity: 0.7 }}>· {g.area}</span>
                          </div>
                          <p style={{ margin: "0 0 5px", fontSize: 13, color: "var(--color-text-secondary)", lineHeight: 1.5 }}>{g.issue}</p>
                          <p style={{ margin: 0, fontSize: 12, color: "var(--color-text-secondary)", lineHeight: 1.5 }}>
                            <i className="ti ti-arrow-right" style={{ fontSize: 12 }} aria-hidden="true" /> {g.fix}
                          </p>
                        </div>
                      );
                    })}
              </div>
            )}

            {tab === "ambiguities" && (
              <div>
                {!result.ambiguities?.length
                  ? <p style={{ fontSize: 13, color: "var(--color-text-primary)" }}>No ambiguous language detected.</p>
                  : result.ambiguities.map((a, i) => (
                      <div key={i} style={{ display: "flex", gap: 12, padding: "11px 0",
                        borderBottom: i < result.ambiguities.length - 1 ? "0.5px solid var(--color-border-tertiary)" : "none" }}>
                        <div style={{ width: 30, height: 30, borderRadius: "50%", background: "#FAEEDA",
                          display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                          <i className="ti ti-question-mark" style={{ fontSize: 15, color: "#854F0B" }} aria-hidden="true" />
                        </div>
                        <div>
                          <div style={{ fontSize: 12, fontFamily: "var(--font-mono)", color: "#854F0B",
                            background: "#FAEEDA", padding: "2px 7px", borderRadius: 4,
                            display: "inline-block", marginBottom: 5 }}>"{a.phrase}"</div>
                          <p style={{ margin: 0, fontSize: 13, color: "var(--color-text-primary)", lineHeight: 1.6 }}>{a.question}</p>
                        </div>
                      </div>
                    ))}
              </div>
            )}

            {tab === "dependencies" && (
              <div>
                {!result.dependencies?.length
                  ? <p style={{ fontSize: 13, color: "var(--color-text-primary)" }}>No dependency signals detected.</p>
                  : result.dependencies.map((d, i) => {
                      const c = CONFIDENCE_CFG[d.confidence] || CONFIDENCE_CFG.low;
                      return (
                        <div key={i} style={{ display: "flex", gap: 11, padding: "11px 0",
                          borderBottom: i < result.dependencies.length - 1 ? "0.5px solid var(--color-border-tertiary)" : "none" }}>
                          <div style={{ width: 30, height: 30, borderRadius: "var(--border-radius-md)",
                            background: "var(--color-background-secondary)", display: "flex",
                            alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                            <i className={`ti ${DEP_ICONS[d.type] || "ti-link"}`}
                              style={{ fontSize: 15, color: "var(--color-text-primary)" }} aria-hidden="true" />
                          </div>
                          <div style={{ flex: 1 }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 7, marginBottom: 3 }}>
                              <span style={{ fontSize: 12, fontWeight: 500, textTransform: "capitalize",
                                color: "var(--color-text-primary)" }}>{d.type}</span>
                              <span style={{ fontSize: 10, fontWeight: 500, padding: "2px 7px",
                                borderRadius: 99, background: c.bg, color: c.color }}>{d.confidence} confidence</span>
                              {d.status && (
                                <span style={{ fontSize: 10, padding: "2px 7px", borderRadius: 99,
                                  background: d.status === "acknowledged" ? "#E1F5EE" : d.status === "implied" ? "#FAEEDA" : "#FCEBEB",
                                  color: d.status === "acknowledged" ? "#0F6E56" : d.status === "implied" ? "#854F0B" : "#A32D2D" }}>
                                  {d.status}
                                </span>
                              )}
                            </div>
                            <p style={{ margin: 0, fontSize: 13, color: "var(--color-text-secondary)", lineHeight: 1.5 }}>{d.description}</p>
                          </div>
                        </div>
                      );
                    })}
              </div>
            )}

            {tab === "improved" && (
              <div>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 11 }}>
                  <span style={{ fontSize: 12, color: "var(--color-text-primary)" }}>AI-suggested rewrite — review before using</span>
                  <button onClick={copyImproved}
                    style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 11,
                      color: "var(--color-text-primary)", background: "none", cursor: "pointer",
                      border: "0.5px solid var(--color-border-secondary)",
                      borderRadius: "var(--border-radius-md)", padding: "4px 9px" }}>
                    <i className={`ti ${copied ? "ti-check" : "ti-copy"}`} style={{ fontSize: 13 }} aria-hidden="true" />
                    {copied ? "Copied" : "Copy"}
                  </button>
                </div>
                <pre style={{ margin: "0 0 14px", fontFamily: "var(--font-mono)", fontSize: 12,
                  lineHeight: 1.7, whiteSpace: "pre-wrap", wordBreak: "break-word",
                  background: "var(--color-background-secondary)", borderRadius: "var(--border-radius-md)",
                  padding: "12px 14px", color: "var(--color-text-secondary)" }}>
                  {result.improved_story}
                </pre>
                {result.suggested_acs?.length > 0 && (
                  <>
                    <div style={{ fontSize: 12, fontWeight: 500, color: "var(--color-text-primary)", marginBottom: 9 }}>
                      Suggested acceptance criteria
                    </div>
                    {result.suggested_acs.map((ac, i) => (
                      <div key={i} style={{ display: "flex", gap: 9, padding: "7px 0",
                        borderBottom: i < result.suggested_acs.length - 1 ? "0.5px solid var(--color-border-tertiary)" : "none" }}>
                        <i className="ti ti-circle-check" style={{ fontSize: 15, color: "#1D9E75",
                          marginTop: 2, flexShrink: 0 }} aria-hidden="true" />
                        <span style={{ fontSize: 13, color: "var(--color-text-primary)", lineHeight: 1.6 }}>{ac}</span>
                      </div>
                    ))}
                  </>
                )}
                {result.split_suggestions?.length > 0 && (
                  <>
                    <div style={{ fontSize: 12, fontWeight: 500, color: "var(--color-text-primary)", marginTop: 16, marginBottom: 9,
                      display: "flex", alignItems: "center", gap: 6 }}>
                      <i className="ti ti-scissors" style={{ fontSize: 13, color: "#EF9F27" }} />
                      Suggested split — this epic may be too large for a single sprint
                    </div>
                    {result.split_suggestions.map((s, i) => (
                      <div key={i} style={{ display: "flex", gap: 9, padding: "7px 0",
                        borderBottom: i < result.split_suggestions.length - 1 ? "0.5px solid var(--color-border-tertiary)" : "none" }}>
                        <span style={{ fontSize: 12, fontWeight: 500, color: "#EF9F27", minWidth: 18 }}>{i + 1}.</span>
                        <span style={{ fontSize: 13, color: "var(--color-text-primary)", lineHeight: 1.6 }}>{s}</span>
                      </div>
                    ))}
                  </>
                )}

                {/* ── Push to Jira ── */}
                <div style={{ marginTop: 18, padding: "14px 16px", borderRadius: "var(--border-radius-md)",
                  border: "0.5px solid var(--color-border-secondary)", background: "var(--color-background-secondary)" }}>
                  <div style={{ fontSize: 12, fontWeight: 500, color: "var(--color-text-primary)", marginBottom: 10,
                    display: "flex", alignItems: "center", gap: 6 }}>
                    <i className="ti ti-brand-jira" style={{ fontSize: 14, color: "#2684FF" }} />
                    Push improved description to Jira
                  </div>
                  <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                    <input
                      value={jiraKey}
                      onChange={function(e) { setJiraKey(e.target.value); setPushStatus(null); }}
                      placeholder="Issue key e.g. PROJ-123"
                      style={{ flex: "1 1 160px", minWidth: 0, padding: "7px 10px", fontSize: 13,
                        border: "0.5px solid var(--color-border-secondary)", borderRadius: "var(--border-radius-md)",
                        background: "#fff", color: "#222", fontFamily: "var(--font-sans)" }}
                    />
                    <button onClick={pushToJira} disabled={pushing}
                      style={{ display: "flex", alignItems: "center", gap: 6, padding: "7px 14px",
                        fontSize: 13, fontWeight: 500, border: "none", borderRadius: "var(--border-radius-md)",
                        background: pushing ? "#314550" : "#053057", color: "#fff",
                        cursor: pushing ? "not-allowed" : "pointer", flexShrink: 0 }}>
                      <i className={`ti ${pushing ? "ti-loader-2" : "ti-upload"}`}
                        style={{ fontSize: 14, animation: pushing ? "spin 1s linear infinite" : "none" }} />
                      {pushing ? "Updating..." : "Update in Jira"}
                    </button>
                  </div>
                  {pushStatus && (
                    <div style={{ marginTop: 9, fontSize: 12, display: "flex", alignItems: "center", gap: 6,
                      color: pushStatus === "ok" ? "#1D9E75" : "#A32D2D" }}>
                      <i className={`ti ${pushStatus === "ok" ? "ti-circle-check" : "ti-alert-circle"}`} style={{ fontSize: 14 }} />
                      {pushMsg}
                    </div>
                  )}
                </div>
              </div>
            )}
          </div>

          {/* Footer */}
          <div style={{ borderTop: "0.5px solid var(--color-border-tertiary)", padding: "11px 18px",
            display: "flex", alignItems: "center", justifyContent: "space-between",
            background: "var(--color-background-secondary)" }}>
            <span style={{ fontSize: 12, color: criticalCount > 0 ? "#A32D2D" : "var(--color-text-secondary)" }}>
              {criticalCount > 0
                ? <><i className="ti ti-alert-circle" style={{ fontSize: 13, marginRight: 5 }} aria-hidden="true" />{criticalCount} blocker{criticalCount > 1 ? "s" : ""} must be resolved before sprint planning</>
                : <><i className="ti ti-circle-check" style={{ fontSize: 13, marginRight: 5, color: "#1D9E75" }} aria-hidden="true" />No blockers — story is good to go</>}
            </span>
            <button onClick={onRecheck}
              style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, fontWeight: 500,
                padding: "6px 14px", background: "#053057", color: "#fff", border: "none",
                borderRadius: "var(--border-radius-md)", cursor: "pointer" }}>
              <i className="ti ti-refresh" style={{ fontSize: 13 }} aria-hidden="true" />
              Re-check
            </button>
          </div>
        </div>
      );
    }

    /* ── Side panel ── */
    const SIDE_CONTENT = {
      story: {
        checks: [
          "Completeness of the story format",
          "Clarity & vague language",
          "Testability of acceptance criteria",
          "Story size & sprint fit",
          "Dependency signals",
        ],
        tips: [
          "Include all existing ACs, even rough ones",
          "Mention the parent epic for dependency detection",
          "Add your DoR to score against your own bar",
        ],
      },
      epic: {
        checks: [
          "Clarity of the epic goal & business outcome",
          "Scope definition & boundary clarity",
          "Decomposability into sprint-sized stories",
          "Dependency & cross-team risk signals",
          "Measurable success criteria",
        ],
        tips: [
          "Include the business outcome, not just the feature",
          "List known dependencies or impacted teams upfront",
          "Add rough story count or sizing if available",
        ],
      },
    };

    function SidePanel({ mode }) {
      const content = SIDE_CONTENT[mode] || SIDE_CONTENT.story;
      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          <div style={{ ...cardStyle, padding: "14px 16px" }}>
            <div style={sideTitleStyle}>
              <i className="ti ti-info-circle" style={{ fontSize: 14, color: "#053057" }} aria-hidden="true" />
              What we check
            </div>
            {content.checks.map((t, i) => (
              <div key={i} style={{ display: "flex", gap: 7, alignItems: "flex-start", padding: "5px 0",
                borderBottom: i < content.checks.length - 1 ? "0.5px solid var(--color-border-tertiary)" : "none" }}>
                <i className="ti ti-check" style={{ fontSize: 13, color: "#1D9E75", flexShrink: 0, marginTop: 1 }} aria-hidden="true" />
                <span style={{ fontSize: 12, color: "var(--color-text-primary)", lineHeight: 1.5 }}>{t}</span>
              </div>
            ))}
          </div>

          <div style={{ ...cardStyle, padding: "14px 16px" }}>
            <div style={sideTitleStyle}>
              <i className="ti ti-bulb" style={{ fontSize: 14, color: "#854F0B" }} aria-hidden="true" />
              Tips for better results
            </div>
            {content.tips.map((t, i) => (
              <div key={i} style={{ display: "flex", gap: 7, alignItems: "flex-start", padding: "5px 0",
                borderBottom: i < content.tips.length - 1 ? "0.5px solid var(--color-border-tertiary)" : "none" }}>
                <i className="ti ti-arrow-right" style={{ fontSize: 12, color: "var(--color-text-primary)", flexShrink: 0, marginTop: 1 }} aria-hidden="true" />

              </div>
            ))}
          </div>

    /* ── Single Story Panel ── */
    function StoryPanel({ selectedStory, onBack, onRecheck }) {
      const [copied, setCopied] = useState(false);
      const [improvedCopied, setImprovedCopied] = useState(false);
      if (!selectedStory) return (
        <div style={{ padding: "48px 24px", textAlign: "center" }}>
          <i className="ti ti-file-analytics" style={{ fontSize: 32, color: "var(--color-text-tertiary)", display: "block", marginBottom: 12 }} aria-hidden="true" />
          <div style={{ fontSize: 14, fontWeight: 500, color: "var(--color-text-primary)", marginBottom: 6 }}>No story selected</div>
          <div style={{ fontSize: 13, color: "var(--color-text-secondary)" }}>Click any story from the Dashboard to view its full analysis here.</div>
        </div>
      );
      if (!selectedStory.result) return (
        <div style={{ padding: "48px 24px", textAlign: "center" }}>
          <i className="ti ti-info-circle" style={{ fontSize: 32, color: "var(--color-text-tertiary)", display: "block", marginBottom: 12 }} aria-hidden="true" />
          <div style={{ fontSize: 14, fontWeight: 500, color: "var(--color-text-primary)", marginBottom: 6 }}>No analysis data for this story</div>
          <div style={{ fontSize: 13, color: "var(--color-text-secondary)", marginBottom: 16 }}>This story was checked before detailed storage was enabled. Re-check it to see the full analysis.</div>
          <button onClick={onRecheck} style={{ fontSize: 13, padding: "8px 18px", background: "#053057", color: "#fff", border: "none", borderRadius: "var(--border-radius-md)", cursor: "pointer" }}>
            Re-check this story
          </button>
        </div>
      );

      const r = selectedStory.result || {};
      const sc = r.scores || {};
      const scoreColor = v => v >= 80 ? "#1D9E75" : v >= 60 ? "#378ADD" : v >= 40 ? "#EF9F27" : "#E24B4A";
      const dimColor = v => v >= 16 ? "#1D9E75" : v >= 11 ? "#378ADD" : v >= 6 ? "#EF9F27" : "#E24B4A";
      const RC = { "Not Ready": { color: "#A32D2D", bg: "#FCEBEB" }, "Needs Work": { color: "#854F0B", bg: "#FAEEDA" }, "Almost Ready": { color: "#053057", bg: "#A2F3F3" }, "Sprint Ready": { color: "#0F6E56", bg: "#E1F5EE" } };
      const rc = RC[r.readiness_level] || RC["Needs Work"];
      const SEV = { critical: { color: "#A32D2D", bg: "#FCEBEB", border: "#F09595", icon: "ti-alert-circle" }, warning: { color: "#854F0B", bg: "#FAEEDA", border: "#EF9F27", icon: "ti-alert-triangle" }, info: { color: "#053057", bg: "#A2F3F3", border: "#A2F3F3", icon: "ti-info-circle" } };
      const SCORE_LABELS = { completeness: "Completeness", clarity: "Clarity", testability: "Testability", size: "Story size", dependency_risk: "Dependencies" };

      function annotatedText(text) {
        if (!text) return null;
        const phrases = (r.ambiguities || []).map(a => a.phrase);
        const lines = text.split("\n");
        return lines.map((line, li) => {
          let parts = [line];
          phrases.forEach(ph => {
            parts = parts.flatMap(p => {
              if (typeof p !== "string") return [p];
              const idx = p.toLowerCase().indexOf(ph.toLowerCase());
              if (idx === -1) return [p];
              return [
                p.slice(0, idx),
                <mark key={ph + li} style={{ background: "#FAEEDA", color: "#854F0B", borderRadius: 3, padding: "0 3px", fontWeight: 500 }}>{p.slice(idx, idx + ph.length)}</mark>,
                p.slice(idx + ph.length)
              ];
            });
          });
          return <div key={li} style={{ lineHeight: 1.8 }}>{parts}</div>;
        });
      }

      return (
        <div style={{ background: "var(--color-background-secondary)" }}>
          {/* Panel header */}
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 20px",
            background: "var(--color-background-primary)", borderBottom: "0.5px solid var(--color-border-tertiary)", flexWrap: "wrap", gap: 10 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <button onClick={onBack} style={{ background: "none", border: "none", cursor: "pointer", padding: 4, color: "var(--color-text-secondary)" }}>
                <i className="ti ti-arrow-left" style={{ fontSize: 16 }} aria-hidden="true" />
              </button>
              {(selectedStory.mode || "story") === "epic"
                ? <span style={{ fontSize: 11, fontWeight: 500, padding: "2px 8px", borderRadius: 99, background: "#EDE9FE", color: "#5B21B6", display: "inline-flex", alignItems: "center", gap: 4 }}>
                    <i className="ti ti-map" style={{ fontSize: 10 }} /> Epic
                  </span>
                : <span style={{ fontSize: 11, fontWeight: 500, padding: "2px 8px", borderRadius: 99, background: "#A2F3F3", color: "#053057", display: "inline-flex", alignItems: "center", gap: 4 }}>
                    <i className="ti ti-sparkles" style={{ fontSize: 10 }} /> User Story
                  </span>
              }
              <span style={{ fontSize: 14, fontWeight: 500, color: "var(--color-text-primary)" }}>{selectedStory.title}</span>
              <span style={{ fontSize: 11, fontWeight: 500, padding: "2px 8px", borderRadius: 99, background: rc.bg, color: rc.color }}>{r.readiness_level}</span>
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={() => { navigator.clipboard.writeText(r.improved_story || ""); setCopied(true); setTimeout(() => setCopied(false), 2000); }}
                style={{ fontSize: 12, padding: "7px 13px", background: "none", border: "0.5px solid var(--color-border-secondary)",
                  borderRadius: "var(--border-radius-md)", color: "var(--color-text-secondary)", cursor: "pointer", display: "flex", alignItems: "center", gap: 5 }}>
                <i className={`ti ${copied ? "ti-check" : "ti-copy"}`} style={{ fontSize: 13 }} aria-hidden="true" />
                {copied ? "Copied" : "Copy improved story"}
              </button>
              <button onClick={onRecheck}
                style={{ fontSize: 12, padding: "7px 13px", background: "#053057", border: "none",
                  borderRadius: "var(--border-radius-md)", color: "#fff", cursor: "pointer", display: "flex", alignItems: "center", gap: 5 }}>
                <i className="ti ti-refresh" style={{ fontSize: 13 }} aria-hidden="true" /> Re-check
              </button>
            </div>
          </div>

          {/* Body — single scrollable layout, no tabs */}
          <div style={{ padding: "20px", display: "flex", flexDirection: "column", gap: 16 }}>

            {/* ── Summary banner ── */}
            {r.summary && (
              <div style={{ background: "var(--color-background-primary)", border: "0.5px solid var(--color-border-tertiary)", borderRadius: "var(--border-radius-lg)", padding: "16px 18px", display: "flex", gap: 14, alignItems: "flex-start" }}>
                <div style={{ flexShrink: 0, marginTop: 2 }}>
                  <span style={{ fontSize: 11, fontWeight: 500, padding: "3px 9px", borderRadius: 99, background: rc.bg, color: rc.color, whiteSpace: "nowrap" }}>{r.readiness_level}</span>
                </div>
                <p style={{ margin: 0, fontSize: 13, color: "var(--color-text-primary)", lineHeight: 1.8 }}>{r.summary}</p>
              </div>
            )}

            {/* ── Two-column: story text + score breakdown ── */}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, alignItems: "start" }}>
              {/* LEFT — story text → improved story → ambiguities → suggested ACs */}
              <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                <div style={{ background: "var(--color-background-primary)", border: "0.5px solid var(--color-border-tertiary)", borderRadius: "var(--border-radius-lg)", padding: "16px 18px" }}>
                  <div style={{ fontSize: 11, fontWeight: 600, color: "var(--color-text-secondary)", letterSpacing: "0.07em", marginBottom: 10 }}>
                    {(selectedStory.mode || "story") === "epic" ? "EPIC TEXT" : "STORY TEXT"}
                  </div>
                  <div style={{ fontSize: 13, color: "var(--color-text-primary)", fontFamily: "var(--font-mono)", lineHeight: 1.8 }}>
                    {annotatedText(selectedStory.story_text)}
                  </div>
                  {(r.ambiguities || []).length > 0 && (
                    <div style={{ marginTop: 12, paddingTop: 12, borderTop: "0.5px solid var(--color-border-tertiary)" }}>
                      <div style={{ fontSize: 11, fontWeight: 600, color: "var(--color-text-secondary)", letterSpacing: "0.07em", marginBottom: 8 }}>AMBIGUITIES</div>
                      {r.ambiguities.map((a, i) => (
                        <div key={i} style={{ fontSize: 12, color: "#854F0B", background: "#FAEEDA", borderRadius: 6, padding: "6px 10px", marginBottom: 6 }}>
                          <strong>"{a.phrase}"</strong> — {a.question}
                        </div>
                      ))}
                    </div>
                  )}
                </div>

                {/* Improved story */}
                {r.improved_story && (
                  <div style={{ background: "var(--color-background-primary)", border: "0.5px solid var(--color-border-tertiary)", borderRadius: "var(--border-radius-lg)", padding: "16px 18px" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                      <div style={{ fontSize: 11, fontWeight: 600, color: "var(--color-text-secondary)", letterSpacing: "0.07em" }}>IMPROVED STORY</div>
                      <button onClick={() => { navigator.clipboard.writeText(r.improved_story); setImprovedCopied(true); setTimeout(() => setImprovedCopied(false), 2000); }}
                        style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 11,
                          color: "var(--color-text-secondary)", background: "none", cursor: "pointer",
                          border: "0.5px solid var(--color-border-secondary)",
                          borderRadius: "var(--border-radius-md)", padding: "3px 8px" }}>
                        <i className={`ti ${improvedCopied ? "ti-check" : "ti-copy"}`} style={{ fontSize: 12 }} />
                        {improvedCopied ? "Copied" : "Copy"}
                      </button>
                    </div>
                    <pre style={{ margin: 0, fontFamily: "var(--font-mono)", fontSize: 12,
                      lineHeight: 1.7, whiteSpace: "pre-wrap", wordBreak: "break-word",
                      background: "var(--color-background-secondary)", borderRadius: "var(--border-radius-md)",
                      padding: "12px 14px", color: "var(--color-text-primary)" }}>
                      {r.improved_story}
                    </pre>
                    {(r.split_suggestions || []).length > 0 && (
                      <div style={{ marginTop: 12, paddingTop: 12, borderTop: "0.5px solid var(--color-border-tertiary)" }}>
                        <div style={{ fontSize: 11, fontWeight: 600, color: "var(--color-text-secondary)", letterSpacing: "0.07em", marginBottom: 8, display: "flex", alignItems: "center", gap: 5 }}>
                          <i className="ti ti-scissors" style={{ fontSize: 11, color: "#EF9F27" }} />SUGGESTED SPLIT
                        </div>
                        {r.split_suggestions.map((s, i) => (
                          <div key={i} style={{ display: "flex", gap: 9, padding: "6px 0", borderBottom: i < r.split_suggestions.length - 1 ? "0.5px solid var(--color-border-tertiary)" : "none" }}>
                            <span style={{ fontSize: 12, fontWeight: 600, color: "#EF9F27", minWidth: 20 }}>{i + 1}.</span>
                            <span style={{ fontSize: 13, color: "var(--color-text-primary)", lineHeight: 1.6 }}>{s}</span>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                )}

                {/* Suggested ACs */}
                {(r.suggested_acs || []).length > 0 && (
                  <div style={{ background: "var(--color-background-primary)", border: "0.5px solid var(--color-border-tertiary)", borderRadius: "var(--border-radius-lg)", padding: "16px 18px" }}>
                    <div style={{ fontSize: 11, fontWeight: 600, color: "var(--color-text-secondary)", letterSpacing: "0.07em", marginBottom: 10 }}>SUGGESTED ACS</div>
                    {r.suggested_acs.map((ac, i) => (
                      <div key={i} style={{ display: "flex", gap: 10, padding: "8px 0", borderBottom: i < r.suggested_acs.length - 1 ? "0.5px solid var(--color-border-tertiary)" : "none" }}>
                        <i className="ti ti-circle-check" style={{ fontSize: 16, color: "#1D9E75", flexShrink: 0, marginTop: 2 }} aria-hidden="true" />
                        <span style={{ fontSize: 13, color: "var(--color-text-primary)", lineHeight: 1.6 }}>{ac}</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>

              {/* RIGHT — score breakdown + gaps */}
              <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                <div style={{ background: "var(--color-background-primary)", border: "0.5px solid var(--color-border-tertiary)", borderRadius: "var(--border-radius-lg)", padding: "16px 18px" }}>
                  <div style={{ fontSize: 11, fontWeight: 600, color: "var(--color-text-secondary)", letterSpacing: "0.07em", marginBottom: 14 }}>SCORE BREAKDOWN</div>
                  <div style={{ display: "flex", alignItems: "baseline", gap: 6, marginBottom: 16 }}>
                    <span style={{ fontSize: 44, fontWeight: 600, color: scoreColor(selectedStory.score) }}>{selectedStory.score}</span>
                    <span style={{ fontSize: 18, color: "var(--color-text-tertiary)" }}>/100</span>
                  </div>
                  {Object.entries(sc).map(([k, v]) => (
                    <div key={k} style={{ marginBottom: 10 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: "var(--color-text-secondary)", marginBottom: 4 }}>
                        <span>{SCORE_LABELS[k] || k}</span>
                        <span style={{ fontWeight: 600, color: dimColor(v) }}>{v}/20</span>
                      </div>
                      <div style={{ height: 5, background: "var(--color-background-secondary)", borderRadius: 99 }}>
                        <div style={{ height: "100%", width: `${(v / 20) * 100}%`, background: dimColor(v), borderRadius: 99 }} />
                      </div>
                    </div>
                  ))}
                </div>
                {(r.gaps || []).length > 0 && (
                  <div style={{ background: "var(--color-background-primary)", border: "0.5px solid var(--color-border-tertiary)", borderRadius: "var(--border-radius-lg)", padding: "16px 18px" }}>
                    <div style={{ fontSize: 11, fontWeight: 600, color: "var(--color-text-secondary)", letterSpacing: "0.07em", marginBottom: 12 }}>ISSUES TO FIX</div>
                    {r.gaps.map((g, i) => {
                      const s = SEV[g.severity] || SEV.info;
                      return (
                        <div key={i} style={{ border: `0.5px solid ${s.border}`, borderRadius: "var(--border-radius-md)", padding: "10px 12px", marginBottom: 8, background: s.bg }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4 }}>
                            <i className={`ti ${s.icon}`} style={{ fontSize: 13, color: s.color }} aria-hidden="true" />
                            <span style={{ fontSize: 11, fontWeight: 600, color: s.color, textTransform: "capitalize" }}>{g.severity}</span>
                            <span style={{ fontSize: 11, color: s.color, opacity: 0.7 }}>· {g.area}</span>
                          </div>
                          <p style={{ margin: "0 0 4px", fontSize: 13, color: "#053057", lineHeight: 1.5 }}>{g.issue}</p>
                          <p style={{ margin: 0, fontSize: 12, color: "#1A1A1A" }}>
                            <i className="ti ti-arrow-right" style={{ fontSize: 11 }} aria-hidden="true" /> {g.fix}
                          </p>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ── Dashboard ── */
    function Dashboard({ history, setHistory, onRecheck }) {
      const PAGE_SIZE = 10;
      const RC = { "Not Ready": { color: "#A32D2D", bg: "#FCEBEB" }, "Needs Work": { color: "#854F0B", bg: "#FAEEDA" }, "Almost Ready": { color: "#053057", bg: "#A2F3F3" }, "Sprint Ready": { color: "#0F6E56", bg: "#E1F5EE" } };
      const scoreColor = v => v >= 80 ? "#1D9E75" : v >= 60 ? "#378ADD" : v >= 40 ? "#EF9F27" : "#E24B4A";

      const [expandedId, setExpandedId] = useState(null);
      const [titleFilter, setTitleFilter] = useState("");
      const [statusFilter, setStatusFilter] = useState("");
      const [typeFilter, setTypeFilter] = useState("");
      const [sortCol, setSortCol] = useState("checked_at");
      const [sortDir, setSortDir] = useState("desc");
      const [page, setPage] = useState(1);

      function toggleSort(col) {
        if (sortCol === col) setSortDir(d => d === "asc" ? "desc" : "asc");
        else { setSortCol(col); setSortDir("desc"); }
        setPage(1);
      }

      function deleteRow(id, e) {
        e.stopPropagation();
        fetch(`/api/history/delete/${id}`).then(() =>
          setHistory(h => h.filter(r => r.id !== id))
        );
      }

      const filtered = history
        .filter(r => r.title.toLowerCase().includes(titleFilter.toLowerCase()))
        .filter(r => !statusFilter || r.readiness_level === statusFilter)
        .filter(r => !typeFilter || (r.mode || "story") === typeFilter)
        .sort((a, b) => {
          let av = a[sortCol] ?? "", bv = b[sortCol] ?? "";
          if (sortCol === "score") { av = Number(av); bv = Number(bv); }
          if (av < bv) return sortDir === "asc" ? -1 : 1;
          if (av > bv) return sortDir === "asc" ? 1 : -1;
          return 0;
        });

      const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
      const pageRows = filtered.slice((page - 1) * PAGE_SIZE, page * PAGE_SIZE);

      function SortIcon({ col }) {
        if (sortCol !== col) return <i className="ti ti-selector" style={{ fontSize: 11, opacity: 0.4 }} />;
        return <i className={`ti ti-sort-${sortDir === "asc" ? "ascending" : "descending"}`} style={{ fontSize: 11, color: "#053057" }} />;
      }

      const thStyle = (extra = {}) => ({
        textAlign: "left", padding: "10px 14px", fontSize: 11, fontWeight: 500,
        color: "var(--color-text-secondary)", borderBottom: "0.5px solid var(--color-border-tertiary)",
        cursor: "pointer", userSelect: "none", whiteSpace: "nowrap", ...extra
      });

      return (
        <div style={{ padding: "24px 20px", background: "var(--color-background-secondary)", minHeight: 300 }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16 }}>
            <div>
              <h2 style={{ fontSize: 18, fontWeight: 500, color: "#053057", margin: "0 0 4px" }}>Sprint Dashboard</h2>
              <p style={{ fontSize: 13, color: "var(--color-text-secondary)", margin: 0 }}>{filtered.length} of {history.length} stories</p>
            </div>
            {history.length > 0 && (
              <button onClick={() => fetch("/api/history/clear").then(() => setHistory([]))}
                style={{ fontSize: 12, padding: "6px 12px", background: "none", cursor: "pointer",
                  border: "0.5px solid var(--color-border-secondary)", borderRadius: "var(--border-radius-md)",
                  color: "var(--color-text-secondary)", display: "flex", alignItems: "center", gap: 5 }}>
                <i className="ti ti-trash" style={{ fontSize: 13 }} /> Clear all
              </button>
            )}
          </div>

          {history.length > 0 && (
            <div style={{ display: "flex", gap: 10, marginBottom: 14, flexWrap: "wrap" }}>
              <input value={titleFilter} onChange={e => { setTitleFilter(e.target.value); setPage(1); }}
                placeholder="Filter by story title…"
                style={{ fontSize: 12, padding: "7px 11px", border: "0.5px solid var(--color-border-secondary)",
                  borderRadius: "var(--border-radius-md)", background: "var(--color-background-primary)",
                  color: "var(--color-text-primary)", width: 220 }} />
              <select value={statusFilter} onChange={e => { setStatusFilter(e.target.value); setPage(1); }}
                style={{ fontSize: 12, padding: "7px 11px", border: "0.5px solid var(--color-border-secondary)",
                  borderRadius: "var(--border-radius-md)", background: "var(--color-background-primary)",
                  color: "var(--color-text-primary)" }}>
                <option value="">All statuses</option>
                {["Not Ready", "Needs Work", "Almost Ready", "Sprint Ready"].map(s => (
                  <option key={s} value={s}>{s}</option>
                ))}
              </select>
              <select value={typeFilter} onChange={e => { setTypeFilter(e.target.value); setPage(1); }}
                style={{ fontSize: 12, padding: "7px 11px", border: "0.5px solid var(--color-border-secondary)",
                  borderRadius: "var(--border-radius-md)", background: "var(--color-background-primary)",
                  color: "var(--color-text-primary)" }}>
                <option value="">All types</option>
                <option value="story">User Story</option>
                <option value="epic">Epic</option>
              </select>
              {(titleFilter || statusFilter || typeFilter) && (
                <button onClick={() => { setTitleFilter(""); setStatusFilter(""); setTypeFilter(""); setPage(1); }}
                  style={{ fontSize: 12, padding: "7px 11px", background: "none", cursor: "pointer",
                    border: "0.5px solid var(--color-border-secondary)", borderRadius: "var(--border-radius-md)",
                    color: "var(--color-text-secondary)" }}>Clear filters</button>
              )}
            </div>
          )}

          {history.length === 0 ? (
            <div style={{ textAlign: "center", padding: "48px 24px" }}>
              <i className="ti ti-clipboard-list" style={{ fontSize: 32, color: "var(--color-text-tertiary)", display: "block", marginBottom: 12 }} />
              <div style={{ fontSize: 14, fontWeight: 500, color: "var(--color-text-primary)", marginBottom: 6 }}>No stories checked yet</div>
              <div style={{ fontSize: 13, color: "var(--color-text-secondary)" }}>Go to the Readiness Checker tab and analyse a story — it will appear here.</div>
            </div>
          ) : filtered.length === 0 ? (
            <div style={{ textAlign: "center", padding: "48px 24px" }}>
              <div style={{ fontSize: 14, color: "var(--color-text-secondary)" }}>No stories match the current filters.</div>
            </div>
          ) : (
            <>
              <div style={{ background: "var(--color-background-primary)", border: "0.5px solid var(--color-border-tertiary)", borderRadius: "var(--border-radius-lg)", overflow: "hidden" }}>
                <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                  <thead>
                    <tr style={{ background: "var(--color-background-secondary)" }}>
                      <th style={thStyle({ width: 36, cursor: "default" })}>#</th>
                      <th style={thStyle()} onClick={() => toggleSort("title")}>Title <SortIcon col="title" /></th>
                      <th style={thStyle({ width: 100 })} onClick={() => toggleSort("mode")}>Type <SortIcon col="mode" /></th>
                      <th style={thStyle()} onClick={() => toggleSort("epic")}>Epic <SortIcon col="epic" /></th>
                      <th style={thStyle()} onClick={() => toggleSort("score")}>Score <SortIcon col="score" /></th>
                      <th style={thStyle()} onClick={() => toggleSort("readiness_level")}>Status <SortIcon col="readiness_level" /></th>
                      <th style={thStyle()} onClick={() => toggleSort("checked_at")}>Checked At <SortIcon col="checked_at" /></th>
                      <th style={thStyle({ cursor: "default", width: 40 })}></th>
                    </tr>
                  </thead>
                  <tbody>
                    {pageRows.map((row, i) => {
                      const rc = RC[row.readiness_level] || RC["Needs Work"];
                      const isExp = expandedId === row.id;
                      return [
                        <tr key={row.id} onClick={() => setExpandedId(isExp ? null : row.id)}
                          style={{ background: isExp ? "#F4F3F0" : "var(--color-background-primary)", cursor: "pointer", borderBottom: isExp ? "none" : undefined }}
                          onMouseEnter={e => { if (!isExp) e.currentTarget.style.background = "#F4F3F0"; }}
                          onMouseLeave={e => { if (!isExp) e.currentTarget.style.background = "var(--color-background-primary)"; }}>
                          <td style={{ padding: "11px 14px", color: "var(--color-text-tertiary)", width: 36 }}>{(page - 1) * PAGE_SIZE + i + 1}</td>
                          <td style={{ padding: "11px 14px", color: "#053057", maxWidth: 240 }}>
                            <div style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", textDecoration: "underline" }}>{row.title}</div>
                          </td>
                          <td style={{ padding: "11px 14px" }}>
                            {(row.mode || "story") === "epic"
                              ? <span style={{ fontSize: 11, fontWeight: 500, padding: "2px 8px", borderRadius: 99, background: "#EDE9FE", color: "#5B21B6", display: "inline-flex", alignItems: "center", gap: 4 }}>
                                  <i className="ti ti-map" style={{ fontSize: 10 }} /> Epic
                                </span>
                              : <span style={{ fontSize: 11, fontWeight: 500, padding: "2px 8px", borderRadius: 99, background: "#A2F3F3", color: "#053057", display: "inline-flex", alignItems: "center", gap: 4 }}>
                                  <i className="ti ti-sparkles" style={{ fontSize: 10 }} /> User Story
                                </span>
                            }
                          </td>
                          <td style={{ padding: "11px 14px", color: "var(--color-text-tertiary)", fontSize: 12 }}>
                            {row.epic || <span style={{ fontStyle: "italic" }}>—</span>}
                          </td>
                          <td style={{ padding: "11px 14px" }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                              <div style={{ height: 5, width: 60, background: "var(--color-background-secondary)", borderRadius: 99 }}>
                                <div style={{ height: "100%", width: `${row.score}%`, borderRadius: 99, background: scoreColor(row.score) }} />
                              </div>
                              <span style={{ fontWeight: 500, color: scoreColor(row.score), fontSize: 12 }}>{row.score}/100</span>
                            </div>
                          </td>
                          <td style={{ padding: "11px 14px" }}>
                            <span style={{ fontSize: 11, fontWeight: 500, padding: "2px 8px", borderRadius: 99, background: rc.bg, color: rc.color }}>{row.readiness_level}</span>
                          </td>
                          <td style={{ padding: "11px 14px", color: "var(--color-text-secondary)", fontSize: 12 }}>{row.checked_at}</td>
                          <td style={{ padding: "11px 14px", display: "flex", alignItems: "center", gap: 6 }} onClick={e => e.stopPropagation()}>
                            <button onClick={e => deleteRow(row.id, e)}
                              style={{ background: "none", border: "none", cursor: "pointer", color: "var(--color-text-tertiary)", padding: "2px 4px", borderRadius: 4 }}
                              onMouseEnter={e => e.currentTarget.style.color = "#A32D2D"}
                              onMouseLeave={e => e.currentTarget.style.color = "var(--color-text-tertiary)"}>
                              <i className="ti ti-trash" style={{ fontSize: 14 }} />
                            </button>
                            <i className={`ti ti-chevron-${isExp ? "up" : "down"}`} style={{ fontSize: 13, color: "var(--color-text-tertiary)" }} />
                          </td>
                        </tr>,
                        isExp && (
                          <tr key={row.id + "-exp"}>
                            <td colSpan={8} style={{ padding: 0, background: "#F4F3F0", borderBottom: "1px solid #314550" }}>
                              <StoryPanel
                                selectedStory={row}
                                onBack={() => setExpandedId(null)}
                                onRecheck={() => onRecheck(row)}
                              />
                            </td>
                          </tr>
                        )
                      ];
                    })}
                  </tbody>
                </table>
              </div>
              {totalPages > 1 && (
                <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 6, padding: "14px 0 2px" }}>
                  <button onClick={() => setPage(p => Math.max(1, p - 1))} disabled={page === 1}
                    style={{ padding: "5px 10px", fontSize: 12, border: "0.5px solid #314550",
                      borderRadius: "var(--border-radius-md)", background: "none", cursor: page === 1 ? "default" : "pointer",
                      color: page === 1 ? "#314550" : "#053057" }}>‹ Prev</button>
                  {Array.from({ length: totalPages }, (_, ii) => ii + 1).map(p => (
                    <button key={p} onClick={() => setPage(p)}
                      style={{ padding: "5px 9px", fontSize: 12, border: "0.5px solid #314550",
                        borderRadius: "var(--border-radius-md)", cursor: "pointer",
                        background: p === page ? "#053057" : "#F4F3F0",
                        color: p === page ? "#FFFFFF" : "#053057" }}>{p}</button>
                  ))}
                  <button onClick={() => setPage(p => Math.min(totalPages, p + 1))} disabled={page === totalPages}
                    style={{ padding: "5px 10px", fontSize: 12, border: "0.5px solid #314550",
                      borderRadius: "var(--border-radius-md)", background: "none", cursor: page === totalPages ? "default" : "pointer",
                      color: page === totalPages ? "#314550" : "#053057" }}>Next ›</button>
                </div>
              )}
            </>
          )}
        </div>
      );
    }

    /* ── Board Selector (Batch Screen 1) ── */
    function BoardSelector({ onSelect }) {
      const [boards, setBoards] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError]   = useState("");
      const [boardPage, setBoardPage] = useState(1);
      const [search, setSearch] = useState("");

      useEffect(() => {
        fetch("/api/jira/board-overview")
          .then(r => r.json())
          .then(d => { setBoards(Array.isArray(d) ? d : []); setLoading(false); })
          .catch(e => { setError(e.message); setLoading(false); });
      }, []);

      const AVATAR_COLORS = ["#053057","#5B21B6","#065F46","#92400E","#1E40AF","#7C3AED","#0F766E","#B45309"];
      function avatarColor(key) {
        let h = 0;
        for (let i = 0; i < (key || "").length; i++) h = (h * 31 + key.charCodeAt(i)) & 0xFFFFFF;
        return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length];
      }
      function initials(name) {
        return (name || "?").split(/\s+/).slice(0,2).map(w => w[0]).join("").toUpperCase();
      }

      if (loading) return (
        <div style={{ padding: "60px 24px", textAlign: "center", color: "#A2F3F3", fontSize: 14 }}>
          <i className="ti ti-loader-2" style={{ fontSize: 32, display: "block", marginBottom: 12, animation: "spin 1s linear infinite", color: "#00EDED" }} />
          Loading boards from Jira…
        </div>
      );
      if (error) return (
        <div style={{ padding: "60px 24px", textAlign: "center", color: "#FCA5A5", fontSize: 13 }}>
          <i className="ti ti-alert-triangle" style={{ fontSize: 32, display: "block", marginBottom: 12, color: "#F87171" }} />
          {error}
        </div>
      );

      const BOARD_PAGE_SIZE = 25;
      const filteredBoards = boards.filter(b => (b.projectName || b.name || "").toLowerCase().includes(search.toLowerCase()));
      const totalBoardPages = Math.ceil(filteredBoards.length / BOARD_PAGE_SIZE);
      const pagedBoards = filteredBoards.slice((boardPage - 1) * BOARD_PAGE_SIZE, boardPage * BOARD_PAGE_SIZE);

      return (
        <div style={{ padding: "24px 20px 28px", background: "#0B0D0E" }}>
          <h2 style={{ fontSize: 17, fontWeight: 600, color: "#fff", margin: "0 0 5px" }}>Select a project and board</h2>
          <p style={{ fontSize: 13, color: "#A2F3F3", opacity: 0.7, margin: "0 0 14px" }}>Choose the sprint or backlog you want to analyse.</p>
          <div style={{ position: "relative", marginBottom: 20 }}>
            <i className="ti ti-search" style={{ position: "absolute", left: 11, top: "50%", transform: "translateY(-50%)", color: "#314550", fontSize: 14, pointerEvents: "none" }} />
            <input
              type="text"
              placeholder="Search projects…"
              value={search}
              onChange={e => { setSearch(e.target.value); setBoardPage(1); }}
              style={{ width: "100%", boxSizing: "border-box", padding: "9px 12px 9px 32px", borderRadius: 8,
                border: "1px solid #314550", background: "#1A1A1A", color: "#F4F3F0",
                fontSize: 13, outline: "none" }}
              onFocus={e => e.target.style.borderColor = "#00EDED"}
              onBlur={e => e.target.style.borderColor = "#314550"}
            />
          </div>
          {filteredBoards.length === 0 && search && (
            <div style={{ textAlign: "center", padding: "40px 0", color: "#314550", fontSize: 13 }}>
              No projects match "<span style={{ color: "#A2F3F3" }}>{search}</span>"
            </div>
          )}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(260px, 1fr))", gap: 12 }}>
            {pagedBoards.map(board => {
              const color = avatarColor(board.projectKey || board.name);
              return (
                <div key={board.id} style={{ border: "1px solid #314550", borderRadius: 10, overflow: "hidden", background: "#1A1A1A" }}>
                  <div style={{ padding: "13px 15px 10px", borderBottom: "1px solid #314550", display: "flex", alignItems: "center", gap: 9 }}>
                    <div style={{ width: 32, height: 32, borderRadius: 8, background: color, flexShrink: 0,
                      display: "flex", alignItems: "center", justifyContent: "center",
                      fontSize: 12, fontWeight: 700, color: "#fff" }}>{initials(board.projectName || board.name)}</div>
                    <div style={{ minWidth: 0 }}>
                      <div style={{ fontSize: 13, fontWeight: 600, color: "#fff", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{board.projectName || board.name}</div>
                      <div style={{ fontSize: 11, color: "#F4F3F0", marginTop: 1 }}>
                        {board.sprints.length} sprint{board.sprints.length !== 1 ? "s" : ""} · {board.backlogCount} backlog
                      </div>
                    </div>
                  </div>
                  <div style={{ padding: "8px" }}>
                    {board.backlogCount > 0 && (
                      <div onClick={() => onSelect({ board, type: "backlog", label: "Backlog", sprintId: null })}
                        style={{ display: "flex", alignItems: "center", justifyContent: "space-between",
                          padding: "9px 10px", borderRadius: 7, cursor: "pointer", marginBottom: 4,
                          border: "1px solid #314550", transition: "background 120ms" }}
                        onMouseEnter={e => e.currentTarget.style.background = "#053057"}
                        onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                        <div style={{ display: "flex", alignItems: "center", gap: 7 }}>
                          <i className="ti ti-stack-2" style={{ fontSize: 13, color: "#A2F3F3" }} />
                          <span style={{ fontSize: 13, color: "#F4F3F0" }}>Backlog</span>
                        </div>
                        <span style={{ fontSize: 11, color: "#F4F3F0" }}>{board.backlogCount} {board.backlogCount === 1 ? "story" : "stories"}</span>
                      </div>
                    )}
                    {board.sprints.map(sprint => {
                      const isActive = sprint.state === "active";
                      return (
                        <div key={sprint.id} onClick={() => onSelect({ board, type: "sprint", label: sprint.name, sprintId: sprint.id })}
                          style={{ display: "flex", alignItems: "center", justifyContent: "space-between",
                            padding: "9px 10px", borderRadius: 7, cursor: "pointer", marginBottom: 4,
                            border: isActive ? "1.5px solid #00EDED" : "1px solid #314550",
                            background: isActive ? "#053057" : "transparent", transition: "background 120ms" }}
                          onMouseEnter={e => { if (!isActive) e.currentTarget.style.background = "#053057"; }}
                          onMouseLeave={e => { if (!isActive) e.currentTarget.style.background = isActive ? "#053057" : "transparent"; }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 7, minWidth: 0 }}>
                            <i className="ti ti-refresh" style={{ fontSize: 13, color: isActive ? "#00EDED" : "#A2F3F3", flexShrink: 0 }} />
                            <span style={{ fontSize: 13, color: isActive ? "#00EDED" : "#F4F3F0", fontWeight: isActive ? 500 : 400,
                              overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{sprint.name}</span>
                            {isActive && <span style={{ fontSize: 9, padding: "1px 6px", borderRadius: 99, flexShrink: 0,
                              background: "#00EDED", color: "#053057", fontWeight: 700, letterSpacing: "0.05em" }}>Active</span>}
                          </div>
                          <span style={{ fontSize: 11, color: "#F4F3F0", flexShrink: 0, marginLeft: 8 }}>{sprint.count} {sprint.count === 1 ? "story" : "stories"}</span>
                        </div>
                      );
                    })}
                    {board.backlogCount === 0 && board.sprints.length === 0 && (
                      <div style={{ padding: "10px", fontSize: 12, color: "#314550", textAlign: "center" }}>No stories</div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
          {totalBoardPages > 1 && (
            <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 6, paddingTop: 20 }}>
              <button onClick={() => setBoardPage(p => Math.max(1, p - 1))} disabled={boardPage === 1}
                style={{ padding: "5px 10px", fontSize: 12, border: "0.5px solid #314550", borderRadius: 6,
                  background: "none", cursor: boardPage === 1 ? "default" : "pointer",
                  color: boardPage === 1 ? "#314550" : "#A2F3F3" }}>‹ Prev</button>
              {Array.from({ length: totalBoardPages }, (_, ii) => ii + 1).map(p => (
                <button key={p} onClick={() => setBoardPage(p)}
                  style={{ padding: "5px 9px", fontSize: 12, border: "0.5px solid #314550", borderRadius: 6,
                    cursor: "pointer", background: p === boardPage ? "#053057" : "#1A1A1A",
                    color: p === boardPage ? "#FFFFFF" : "#A2F3F3" }}>{p}</button>
              ))}
              <button onClick={() => setBoardPage(p => Math.min(totalBoardPages, p + 1))} disabled={boardPage === totalBoardPages}
                style={{ padding: "5px 10px", fontSize: 12, border: "0.5px solid #314550", borderRadius: 6,
                  background: "none", cursor: boardPage === totalBoardPages ? "default" : "pointer",
                  color: boardPage === totalBoardPages ? "#314550" : "#A2F3F3" }}>Next ›</button>
            </div>
          )}
        </div>
      );
    }

    /* ── Full result detail for batch rows (light-themed mirror of ResultState) ── */
    function BatchResultDetail({ result }) {
      const [tab, setTab] = useState("gaps");
      const [copied, setCopied] = useState(false);

      function copyImproved() {
        navigator.clipboard.writeText(result.improved_story || "");
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      }

      const rc = READINESS_CFG[result.readiness_level] || READINESS_CFG["Needs Work"];
      const criticalCount = result.gaps?.filter(g => g.severity === "critical").length || 0;
      const tabs = [
        { id: "gaps",         label: "Gaps",          icon: "ti-alert-circle",  count: result.gaps?.length },
        { id: "ambiguities",  label: "Ambiguities",   icon: "ti-question-mark", count: result.ambiguities?.length },
        { id: "dependencies", label: "Dependencies",  icon: "ti-git-branch",    count: result.dependencies?.length },
        { id: "improved",     label: "Improved story", icon: "ti-sparkles",     count: null },
      ];

      return (
        <div style={{ border: "1px solid #314550", borderRadius: 8, overflow: "hidden", background: "#fff", marginTop: 14 }}>

          {/* Score header */}
          <div style={{ padding: "14px 16px", borderBottom: "1px solid #314550" }}>
            <div style={{ display: "flex", gap: 20, alignItems: "flex-start", flexWrap: "wrap" }}>
              <div style={{ minWidth: 120 }}>
                <div style={{ fontSize: 10, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.06em", color: "#1A1A1A", marginBottom: 5 }}>Readiness score</div>
                <div style={{ display: "flex", alignItems: "baseline", gap: 5, marginBottom: 7 }}>
                  <span style={{ fontSize: 40, fontWeight: 500, color: scoreColor(result.total / 5), lineHeight: 1 }}>{result.total}</span>
                  <span style={{ fontSize: 14, color: "#1A1A1A" }}>/100</span>
                </div>
                <span style={{ display: "inline-block", fontSize: 11, fontWeight: 500, padding: "3px 10px", borderRadius: 99, background: rc.bg, color: rc.color }}>{result.readiness_level}</span>
              </div>
              <div style={{ flex: 1, minWidth: 160 }}>
                {Object.entries(result.scores || {}).map(([k, v]) => (
                  <div key={k} style={{ marginBottom: 6 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "#1A1A1A", marginBottom: 3 }}>
                      <span>{SCORE_LABELS[k] || k}</span>
                      <span style={{ color: scoreColor(v), fontWeight: 500 }}>{v}/20</span>
                    </div>
                    <div style={{ height: 4, background: "#F4F3F0", borderRadius: 99 }}>
                      <div style={{ height: "100%", width: `${Math.round((v / 20) * 100)}%`, background: scoreColor(v), borderRadius: 99, transition: "width 0.7s ease" }} />
                    </div>
                  </div>
                ))}
              </div>
            </div>
            {result.summary && (
              <p style={{ margin: "12px 0 0", fontSize: 13, color: "#314550", lineHeight: 1.7, borderTop: "1px solid #314550", paddingTop: 10 }}>{result.summary}</p>
            )}
          </div>

          {/* Tabs */}
          <div style={{ display: "flex", borderBottom: "1px solid #314550", padding: "0 6px", background: "#F4F3F0" }}>
            {tabs.map(t => (
              <button key={t.id} onClick={() => setTab(t.id)}
                style={{ display: "flex", alignItems: "center", gap: 5, padding: "8px 11px", fontSize: 12,
                  fontWeight: tab === t.id ? 500 : 400,
                  color: tab === t.id ? "#053057" : "#1A1A1A",
                  background: "none", border: "none",
                  borderBottom: tab === t.id ? "2px solid #053057" : "2px solid transparent",
                  cursor: "pointer", marginBottom: -1 }}>
                <i className={`ti ${t.icon}`} style={{ fontSize: 12 }} />
                {t.label}
                {t.count > 0 && (
                  <span style={{ fontSize: 10, fontWeight: 500, padding: "1px 5px", borderRadius: 99,
