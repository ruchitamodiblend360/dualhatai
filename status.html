<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Status Generator — Blend PM Tools</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css" />
  <script src="/vendor/react.production.min.js"></script>
  <script src="/vendor/react-dom.production.min.js"></script>
  <script src="/vendor/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0B0D0E; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; color: #fff; }
    #root { min-height: 100vh; }
    @keyframes spin  { from { transform: rotate(0deg) } to { transform: rotate(360deg) } }
    button:not(:disabled):hover { opacity: 0.88; }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #0B0D0E; } ::-webkit-scrollbar-thumb { background: #314550; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    function showError(title, detail) {
      var r = document.getElementById("root");
      if (r) r.innerHTML = '<div style="max-width:760px;margin:40px auto;padding:20px 24px;border:1px solid #7F1D1D;background:#1a0808;border-radius:12px;font-family:sans-serif;color:#FCA5A5"><div style="font-weight:600;font-size:15px;margin-bottom:8px">' + title + '</div><pre style="white-space:pre-wrap;font-size:12px;margin:0;color:#fecaca">' + detail + '</pre></div>';
    }
    window.addEventListener("error", function(e) { showError("Script error", (e.message||e.error||e)+"\n"+(e.filename||"")); });
    window.addEventListener("unhandledrejection", function(e) { showError("Promise rejection", (e.reason&&e.reason.message)||e.reason||"unknown"); });
  </script>

  <script type="text/plain" id="app-src">
    const { useState, useEffect } = React;

    async function generatePptx(deck) {
      const resp = await fetch("/api/export-pptx", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(deck),
      });
      if (!resp.ok) {
        const err = await resp.json().catch(function() { return { error: resp.statusText }; });
        throw new Error(err.error || resp.statusText);
      }
      const blob = await resp.blob();
      const fn = ((deck.projectName || "status") + "-status-deck").replace(/[^a-zA-Z0-9\-]/g, "-") + ".pptx";
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = fn;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function StatusGenerator() {
      const [boards, setBoards]                 = useState([]);
      const [loading, setLoading]               = useState(true);
      const [loadErr, setLoadErr]               = useState("");
      const [selectedBoard, setSelectedBoard]   = useState(null);
      const [selectedSprint, setSelectedSprint] = useState(null);
      const [generating, setGenerating]         = useState(false);
      const [deck, setDeck]                     = useState(null);
      const [genError, setGenError]             = useState("");
      const [exporting, setExporting]           = useState(false);

      useEffect(function() {
        fetch("/api/jira/board-overview")
          .then(function(r) { return r.json(); })
          .then(function(d) { setBoards(Array.isArray(d) ? d : []); setLoading(false); })
          .catch(function(e) { setLoadErr(e.message); setLoading(false); });
      }, []);

      const AVATAR_COLORS = ["#053057","#5B21B6","#065F46","#92400E","#1E40AF","#7C3AED","#0F766E","#B45309"];
      function avatarColor(key) {
        var h = 0;
        for (var i = 0; i < (key || "").length; i++) h = (h * 31 + key.charCodeAt(i)) & 0xFFFFFF;
        return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length];
      }
      function initials(name) {
        return (name || "?").split(/\s+/).slice(0, 2).map(function(w) { return w[0]; }).join("").toUpperCase();
      }

      function generate() {
        if (!selectedBoard || !selectedSprint) return;
        setGenerating(true); setGenError(""); setDeck(null);
        fetch("/api/status-deck", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            boardId:     selectedBoard.id,
            sprintId:    selectedSprint.id || null,
            isBacklog:   selectedSprint.type === "backlog",
            projectName: selectedBoard.projectName || selectedBoard.name,
            sprintName:  selectedSprint.name,
          })
        })
        .then(function(r) { return r.json(); })
        .then(function(d) { if (d.error) setGenError(d.error); else setDeck(d); setGenerating(false); })
        .catch(function(e) { setGenError(e.message); setGenerating(false); });
      }

      function handleExport() {
        if (!deck) return;
        setExporting(true);
        generatePptx(deck)
          .catch(function(e) { alert("PPTX export failed: " + e.message); })
          .finally(function() { setExporting(false); });
      }

      function SprintBar() {
        if (!selectedBoard) return null;
        const sprints = selectedBoard.sprints || [];
        return (
          <div style={{ padding: "14px 20px", background: "#1A1A1A", borderBottom: "1px solid #314550" }}>
            <div style={{ display: "flex", flexWrap: "wrap", alignItems: "center", gap: 10 }}>
              <span style={{ fontSize: 13, fontWeight: 600, color: "#A2F3F3", flexShrink: 0, marginRight: 4 }}>
                {selectedBoard.projectName || selectedBoard.name}
              </span>
              {sprints.map(function(sprint) {
                const isActive = sprint.state === "active";
                const isSel    = selectedSprint && selectedSprint.id === sprint.id;
                return (
                  <button key={sprint.id}
                    onClick={function() { setSelectedSprint(Object.assign({}, sprint, { type: "sprint" })); setDeck(null); }}
                    style={{ padding: "5px 13px", borderRadius: 99, fontSize: 12, cursor: "pointer",
                      border: isSel ? "2px solid #00EDED" : isActive ? "1.5px solid #053057" : "1px solid #314550",
                      background: isSel ? "#00EDED" : "transparent",
                      color: isSel ? "#053057" : isActive ? "#A2F3F3" : "#cbd5e1",
                      fontWeight: isSel ? 700 : isActive ? 500 : 400 }}>
                    {isActive && !isSel && <span style={{ fontSize: 8, padding: "1px 5px", borderRadius: 99, background: "#053057", color: "#A2F3F3", marginRight: 5, fontWeight: 700 }}>ACTIVE</span>}
                    {sprint.name}
                  </button>
                );
              })}
              {selectedBoard.backlogCount > 0 && (
                <button
                  onClick={function() { setSelectedSprint({ type: "backlog", name: "Backlog", id: null }); setDeck(null); }}
                  style={{ padding: "5px 13px", borderRadius: 99, fontSize: 12, cursor: "pointer",
                    border: selectedSprint && selectedSprint.type === "backlog" ? "2px solid #00EDED" : "1px solid #314550",
                    background: selectedSprint && selectedSprint.type === "backlog" ? "#00EDED" : "transparent",
                    color: selectedSprint && selectedSprint.type === "backlog" ? "#053057" : "#cbd5e1",
                    fontWeight: selectedSprint && selectedSprint.type === "backlog" ? 700 : 400 }}>
                  <i className="ti ti-stack-2" style={{ fontSize: 11, marginRight: 4 }} />Backlog
                </button>
              )}
              {selectedSprint && (
                <button onClick={generate} disabled={generating}
                  style={{ marginLeft: 6, padding: "7px 18px", borderRadius: 8, border: "none",
                    background: generating ? "#314550" : "#00EDED", color: "#053057",
                    fontSize: 13, fontWeight: 700, cursor: generating ? "not-allowed" : "pointer",
                    display: "flex", alignItems: "center", gap: 7 }}>
                  {generating
                    ? <span><i className="ti ti-loader-2" style={{ animation: "spin 1s linear infinite", marginRight: 6 }} />Generating...</span>
                    : <span><i className="ti ti-sparkles" style={{ marginRight: 6 }} />Generate Status Deck</span>}
                </button>
              )}
              {deck && !generating && (
                <button onClick={function() { setDeck(null); setSelectedBoard(null); setSelectedSprint(null); }}
                  style={{ padding: "6px 12px", borderRadius: 8, border: "1px solid #314550", background: "transparent",
                    color: "#A2F3F3", fontSize: 12, cursor: "pointer" }}>
                  <i className="ti ti-arrow-left" style={{ marginRight: 4 }} /> Change Board
                </button>
              )}
            </div>
            {genError && (
              <div style={{ marginTop: 10, padding: "9px 14px", background: "#1a0808", border: "1px solid #7F1D1D", borderRadius: 8, fontSize: 13, color: "#FCA5A5" }}>
                <i className="ti ti-alert-circle" style={{ marginRight: 6 }} />{genError}
              </div>
            )}
          </div>
        );
      }

      function BoardGrid() {
        if (loading) return (
          <div style={{ padding: "60px 24px", textAlign: "center", color: "#A2F3F3", fontSize: 14 }}>
            <i className="ti ti-loader-2" style={{ fontSize: 32, display: "block", marginBottom: 12, animation: "spin 1s linear infinite", color: "#00EDED" }} />
            Loading Jira boards...
          </div>
        );
        if (loadErr) return (
          <div style={{ padding: "60px 24px", textAlign: "center", color: "#FCA5A5", fontSize: 13 }}>
            <i className="ti ti-alert-triangle" style={{ fontSize: 32, display: "block", marginBottom: 12, color: "#F87171" }} />
            {loadErr}
          </div>
        );
        return (
          <div style={{ padding: "24px 20px 28px" }}>
            <h2 style={{ fontSize: 17, fontWeight: 600, color: "#fff", margin: "0 0 5px" }}>Select a project board</h2>
            <p style={{ fontSize: 13, color: "#A2F3F3", opacity: 0.7, margin: "0 0 20px" }}>
              Pick a board, then select a sprint to generate an executive status deck with AI.
            </p>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(240px, 1fr))", gap: 12 }}>
              {boards.map(function(board) {
                const color = avatarColor(board.projectKey || board.name);
                const isSel = selectedBoard && selectedBoard.id === board.id;
                return (
                  <div key={board.id}
                    onClick={function() { setSelectedBoard(board); setSelectedSprint(null); setDeck(null); }}
                    style={{ border: isSel ? "2px solid #00EDED" : "1px solid #314550", borderRadius: 10,
                      background: isSel ? "#0D2030" : "#1A1A1A", cursor: "pointer",
                      padding: "13px 15px", display: "flex", alignItems: "center", gap: 11 }}>
                    <div style={{ width: 34, height: 34, borderRadius: 8, background: color, flexShrink: 0,
                      display: "flex", alignItems: "center", justifyContent: "center",
                      fontSize: 12, fontWeight: 700, color: "#fff" }}>{initials(board.projectName || board.name)}</div>
                    <div style={{ minWidth: 0 }}>
                      <div style={{ fontSize: 13, fontWeight: 600, color: isSel ? "#00EDED" : "#fff",
                        overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                        {board.projectName || board.name}
                      </div>
                      <div style={{ fontSize: 11, color: "#4a6070", marginTop: 2 }}>
                        {board.sprints.length} sprint{board.sprints.length !== 1 ? "s" : ""} &middot; {board.backlogCount} backlog
                      </div>
                    </div>
                    {isSel && <i className="ti ti-check" style={{ marginLeft: "auto", color: "#00EDED", fontSize: 16, flexShrink: 0 }} />}
                  </div>
                );
              })}
            </div>
          </div>
        );
      }

      function DeckView(props) {
        const d = props.d;
        const hcfg = ({
          "On Track":  { bg: "#052e16", border: "#065F46", text: "#6EE7B7", icon: "ti-circle-check" },
          "At Risk":   { bg: "#2d1800", border: "#B45309", text: "#FCD34D", icon: "ti-alert-triangle" },
          "Off Track": { bg: "#2a0505", border: "#7F1D1D", text: "#F87171", icon: "ti-circle-x" },
        })[d.healthStatus] || { bg: "#2d1800", border: "#B45309", text: "#FCD34D", icon: "ti-alert-triangle" };

        const m = d.metrics || {};
        const compPct = m.completionPct || 0;

        return (
          <div style={{ padding: "20px" }}>
            {/* Header */}
            <div style={{ background: "#053057", borderRadius: 12, padding: "18px 22px", marginBottom: 16, display: "flex", alignItems: "flex-start", justifyContent: "space-between", flexWrap: "wrap", gap: 12 }}>
              <div>
                <div style={{ fontSize: 10, fontWeight: 700, color: "#00EDED", letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 5 }}>Weekly Status Update</div>
                <div style={{ fontSize: 22, fontWeight: 700, color: "#fff" }}>{d.projectName}</div>
                <div style={{ fontSize: 13, color: "#A2F3F3", marginTop: 4 }}>{d.sprintName} &middot; {d.weekOf}</div>
              </div>
              <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 10 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 16px", borderRadius: 99,
                  background: hcfg.bg, border: "1.5px solid " + hcfg.border, color: hcfg.text, fontWeight: 700, fontSize: 13 }}>
                  <i className={"ti " + hcfg.icon} />{d.healthStatus}
                </div>
                <button onClick={handleExport} disabled={exporting}
                  style={{ padding: "9px 18px", borderRadius: 8, border: "none",
                    background: exporting ? "#314550" : "#00EDED", color: "#053057",
                    fontSize: 13, fontWeight: 700, cursor: exporting ? "not-allowed" : "pointer",
                    display: "flex", alignItems: "center", gap: 7 }}>
                  {exporting
                    ? <span><i className="ti ti-loader-2" style={{ animation: "spin 1s linear infinite", marginRight: 6 }} />Generating PPTX...</span>
                    : <span><i className="ti ti-file-export" style={{ marginRight: 6 }} />Export as PPTX</span>}
                </button>
              </div>
            </div>

            {/* Executive Summary */}
            <div style={{ background: "#1A1A1A", border: "1px solid #314550", borderRadius: 10, padding: "15px 18px", marginBottom: 14 }}>
              <div style={{ fontSize: 10, fontWeight: 700, color: "#00EDED", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 9 }}>Executive Summary</div>
              <p style={{ margin: 0, fontSize: 14, color: "#F4F3F0", lineHeight: 1.7 }}>{d.executiveSummary}</p>
            </div>

            {/* Metrics */}
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(110px, 1fr))", gap: 8, marginBottom: 14 }}>
              {[
                { label: "Total",       value: m.totalIssues,       icon: "ti-list",         color: "#fff" },
                { label: "Completed",   value: m.doneIssues,        icon: "ti-circle-check", color: "#6EE7B7" },
                { label: "In Progress", value: m.inProgressIssues,  icon: "ti-loader-2",     color: "#FCD34D" },
                { label: "Completion",  value: compPct + "%",       icon: "ti-chart-pie",    color: compPct >= 60 ? "#6EE7B7" : compPct >= 40 ? "#FCD34D" : "#F87171" },
              ].map(function(stat) {
                return (
                  <div key={stat.label} style={{ background: "#1A1A1A", border: "1px solid #314550", borderRadius: 8, padding: "11px 13px" }}>
                    <div style={{ fontSize: 10, color: "#4a6070", marginBottom: 5, display: "flex", alignItems: "center", gap: 4 }}>
                      <i className={"ti " + stat.icon} style={{ fontSize: 12 }} />{stat.label}
                    </div>
                    <div style={{ fontSize: 22, fontWeight: 700, color: stat.color }}>{stat.value}</div>
                  </div>
                );
              })}
            </div>

            {/* Progress bar */}
            <div style={{ marginBottom: 14 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 5, fontSize: 11, color: "#4a6070" }}>
                <span>Sprint completion</span><span style={{ color: "#00EDED", fontWeight: 700 }}>{compPct}%</span>
              </div>
              <div style={{ height: 6, background: "#314550", borderRadius: 99, overflow: "hidden" }}>
                <div style={{ height: "100%", width: compPct + "%", background: "linear-gradient(90deg, #053057, #00EDED)", borderRadius: 99 }} />
              </div>
            </div>

            {/* Accomplishments + Next Steps */}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 14 }}>
              <div style={{ border: "1px solid #314550", borderRadius: 10, overflow: "hidden" }}>
                <div style={{ padding: "11px 15px", background: "#053057", display: "flex", alignItems: "center", gap: 8 }}>
                  <i className="ti ti-circle-check" style={{ color: "#A2F3F3", fontSize: 14 }} />
                  <span style={{ fontSize: 13, fontWeight: 600, color: "#fff" }}>Key Accomplishments</span>
                  <span style={{ marginLeft: "auto", fontSize: 11, background: "#00EDED22", color: "#A2F3F3", padding: "1px 7px", borderRadius: 99 }}>{(d.accomplishments || []).length}</span>
                </div>
                <div style={{ padding: "6px", background: "#0B0D0E" }}>
                  {(d.accomplishments || []).length === 0
                    ? <div style={{ padding: "18px", fontSize: 13, color: "#4a6070", textAlign: "center" }}>No completed items</div>
                    : (d.accomplishments || []).map(function(a, i) {
                      return (
                        <div key={i} style={{ display: "flex", gap: 9, padding: "9px 10px", borderRadius: 7, marginBottom: 2, background: i % 2 === 0 ? "#1A1A1A" : "#0B0D0E" }}>
                          <i className="ti ti-check" style={{ color: "#00EDED", fontSize: 12, flexShrink: 0, marginTop: 2 }} />
                          <div>
                            <div style={{ fontSize: 13, color: "#F4F3F0" }}>{a.sentence || a.title}</div>
                          </div>
                        </div>
                      );
                    })
                  }
                </div>
              </div>

              <div style={{ border: "1px solid #314550", borderRadius: 10, overflow: "hidden" }}>
                <div style={{ padding: "11px 15px", background: "#053057", display: "flex", alignItems: "center", gap: 8 }}>
                  <i className="ti ti-arrow-right-circle" style={{ color: "#A2F3F3", fontSize: 14 }} />
                  <span style={{ fontSize: 13, fontWeight: 600, color: "#fff" }}>Next Steps</span>
                  <span style={{ marginLeft: "auto", fontSize: 11, background: "#00EDED22", color: "#A2F3F3", padding: "1px 7px", borderRadius: 99 }}>{(d.nextSteps || []).length}</span>
                </div>
                <div style={{ padding: "6px", background: "#0B0D0E" }}>
                  {(d.nextSteps || []).length === 0
                    ? <div style={{ padding: "18px", fontSize: 13, color: "#4a6070", textAlign: "center" }}>No action items</div>
                    : (d.nextSteps || []).map(function(s, i) {
                      return (
                        <div key={i} style={{ padding: "9px 10px", borderRadius: 7, marginBottom: 2, background: i % 2 === 0 ? "#1A1A1A" : "#0B0D0E" }}>
                          <div style={{ display: "flex", alignItems: "flex-start", gap: 7 }}>
                            <i className="ti ti-arrow-right" style={{ color: "#A2F3F3", fontSize: 12, flexShrink: 0, marginTop: 2 }} />
                            <div style={{ fontSize: 13, color: "#F4F3F0" }}>{s.action}</div>
                          </div>
                        </div>
                      );
                    })
                  }
                </div>
              </div>
            </div>

            {/* Blockers */}
            {(d.blockers || []).length > 0 && (
              <div style={{ border: "1px solid #7F1D1D", borderRadius: 10, overflow: "hidden", marginBottom: 14 }}>
                <div style={{ padding: "11px 15px", background: "#450a0a", display: "flex", alignItems: "center", gap: 8 }}>
                  <i className="ti ti-alert-triangle" style={{ color: "#FCA5A5", fontSize: 14 }} />
                  <span style={{ fontSize: 13, fontWeight: 600, color: "#fff" }}>Issues, Blockers &amp; Risks</span>
                  <span style={{ marginLeft: "auto", fontSize: 11, color: "#FCA5A5", background: "#7F1D1D44", padding: "1px 7px", borderRadius: 99 }}>{d.blockers.length}</span>
                </div>
                <div style={{ padding: "8px", background: "#0B0D0E" }}>
                  {d.blockers.map(function(b, i) {
                    const ic = ({ High: { bg: "#2a0505", border: "#F87171", text: "#F87171" }, Medium: { bg: "#2d1800", border: "#FCD34D", text: "#FCD34D" }, Low: { bg: "#052e16", border: "#6EE7B7", text: "#6EE7B7" } })[b.impact] || { bg: "#2d1800", border: "#FCD34D", text: "#FCD34D" };
                    return (
                      <div key={i} style={{ padding: "12px 14px", borderRadius: 8, marginBottom: 6, background: ic.bg, border: "1px solid " + ic.border + "50" }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 5 }}>
                          <i className="ti ti-circle-x" style={{ color: ic.text, fontSize: 14 }} />
                          <span style={{ fontSize: 13, fontWeight: 600, color: "#fff", flex: 1 }}>{b.title}</span>
                          <span style={{ fontSize: 10, padding: "2px 8px", borderRadius: 99, fontWeight: 700, background: ic.text + "30", color: ic.text }}>{b.impact}</span>
                          {b.type && <span style={{ fontSize: 10, padding: "2px 7px", borderRadius: 99, fontWeight: 600, background: "#314550", color: "#A2F3F3" }}>{b.type}</span>}
                        </div>
                        {b.mitigation && <div style={{ fontSize: 12, color: "#A2F3F3", marginLeft: 22 }}>Mitigation: {b.mitigation}</div>}
                        {b.owner && <div style={{ fontSize: 11, color: "#4a6070", marginLeft: 22, marginTop: 3 }}>Owner: {b.owner}</div>}
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* Milestones */}
            {(d.milestones || []).length > 0 && (
              <div style={{ border: "1px solid #314550", borderRadius: 10, overflow: "hidden", marginBottom: 14 }}>
                <div style={{ padding: "11px 15px", background: "#1A1A1A", borderBottom: "1px solid #314550", display: "flex", alignItems: "center", gap: 8 }}>
                  <i className="ti ti-flag" style={{ color: "#00EDED", fontSize: 14 }} />
                  <span style={{ fontSize: 13, fontWeight: 600, color: "#fff" }}>Milestones</span>
                </div>
                <div style={{ padding: "6px", background: "#0B0D0E" }}>
                  {d.milestones.map(function(ms, i) {
                    const sc = ({ complete: { icon: "ti-circle-check", color: "#00EDED" }, in_progress: { icon: "ti-loader-2", color: "#FCD34D" }, upcoming: { icon: "ti-clock", color: "#4a6070" } })[ms.status] || { icon: "ti-clock", color: "#4a6070" };
                    return (
                      <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, padding: "9px 10px", borderRadius: 7, marginBottom: 2, background: i % 2 === 0 ? "#1A1A1A" : "#0B0D0E" }}>
                        <i className={"ti " + sc.icon} style={{ color: sc.color, fontSize: 14 }} />
                        <span style={{ fontSize: 13, color: "#F4F3F0" }}>{ms.name}</span>
                        {ms.date && <span style={{ marginLeft: "auto", fontSize: 11, color: "#4a6070" }}>{ms.date}</span>}
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            <div style={{ display: "flex", justifyContent: "flex-end", gap: 8 }}>
              <button onClick={generate} disabled={generating}
                style={{ padding: "8px 16px", borderRadius: 8, border: "1px solid #314550", background: "transparent",
                  color: "#A2F3F3", fontSize: 13, cursor: "pointer", display: "flex", alignItems: "center", gap: 6 }}>
                <i className="ti ti-refresh" /> Regenerate
              </button>
            </div>
          </div>
        );
      }

      return (
        <div>
          <SprintBar />
          {!deck && !generating && <BoardGrid />}
          {generating && (
            <div style={{ padding: "72px 24px", textAlign: "center", color: "#A2F3F3", fontSize: 14 }}>
              <i className="ti ti-loader-2" style={{ fontSize: 36, display: "block", marginBottom: 14, animation: "spin 1s linear infinite", color: "#00EDED" }} />
              Fetching Jira data and generating status deck...
            </div>
          )}
          {deck && !generating && <DeckView d={deck} />}
        </div>
      );
    }

    function App() {
      return (
        <div style={{ minHeight: "100vh", background: "#0B0D0E" }}>
          <nav style={{ display: "flex", alignItems: "center", background: "#053057", borderBottom: "1px solid #314550" }}>
            <a href="/"
              style={{ display: "flex", alignItems: "center", gap: 7, padding: "12px 18px",
                fontSize: 13, color: "#A2F3F3", textDecoration: "none",
                borderRight: "1px solid #314550", flexShrink: 0 }}>
              <i className="ti ti-home" style={{ fontSize: 15 }} /> Home
            </a>
            <div style={{ display: "flex", alignItems: "center", gap: 7, padding: "10px 18px",
              fontSize: 13, fontWeight: 700, color: "#053057", background: "#00EDED",
              margin: "4px 0 4px 8px", borderRadius: 7 }}>
              <i className="ti ti-presentation-analytics" style={{ fontSize: 15 }} /> Status Generator
            </div>
          </nav>
          <div style={{ maxWidth: 1100, margin: "0 auto" }}>
            <StatusGenerator />
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

  <script>
    (function() {
      var src = document.getElementById("app-src").textContent;
      try {
        var out = Babel.transform(src, {
          presets: [["react", { runtime: "classic" }]],
        }).code;
        (0, eval)(out);
      } catch(e) {
        var r = document.getElementById("root");
        if (r) r.innerHTML = '<div style="max-width:760px;margin:40px auto;padding:20px 24px;border:1px solid #7F1D1D;background:#1a0808;border-radius:12px;font-family:monospace;color:#FCA5A5"><div style="font-weight:600;font-size:15px;margin-bottom:8px">Failed to compile the UI</div><pre style="white-space:pre-wrap;font-size:12px;margin:0;color:#fecaca">' + String(e) + '</pre></div>';
      }
    })();
  </script>
</body>
</html>
